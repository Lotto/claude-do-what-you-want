<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirograph</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020206; color: #a0a0b0; font: 11px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #top { padding: 7px 14px; background: #06060a; border-bottom: 1px solid #10101c; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
  h1 { font-size: 12px; color: #b0b0c8; letter-spacing: 0.2em; text-transform: uppercase; }
  canvas { display: block; flex: 1; }
  button { background: #0c0c16; border: 1px solid #222236; color: #7070a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; }
  button:hover { background: #12122a; color: #a0a0c8; }
  button.active { background: #1a3060; color: #80c0ff; border-color: #3060a0; }
  select { background: #0c0c16; border: 1px solid #222236; color: #7070a0; font: 11px 'Courier New', monospace; padding: 2px 5px; }
  label { color: #505068; font-size: 11px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  input[type=range] { width: 62px; accent-color: #4060c0; }
  .sep { width: 1px; height: 18px; background: #141422; margin: 0 1px; }
  #info { position: absolute; bottom: 8px; left: 12px; font-size: 10px; color: #1a1a30; pointer-events: none; }
</style>
</head>
<body>
<div id="top">
  <h1>Spirograph</h1>
  <div class="sep"></div>
  <select id="selMode">
    <option value="spiro">Spirograph</option>
    <option value="harmo">Harmonograph</option>
    <option value="lissajous">Lissajous</option>
    <option value="rose">Rose Curve</option>
    <option value="maurer">Maurer Rose</option>
  </select>
  <div class="sep"></div>
  <label>P1 <input type="range" id="rngP1" min="1" max="30" step="1" value="5"></label>
  <label>P2 <input type="range" id="rngP2" min="1" max="30" step="1" value="3"></label>
  <label>P3 <input type="range" id="rngP3" min="0.1" max="1" step="0.05" value="0.6"></label>
  <div class="sep"></div>
  <label>Speed <input type="range" id="rngSpeed" min="1" max="50" step="1" value="15"></label>
  <label>Width <input type="range" id="rngWidth" min="0.3" max="4" step="0.1" value="1"></label>
  <div class="sep"></div>
  <select id="selColor">
    <option value="0">Rainbow</option>
    <option value="1">Neon Pink</option>
    <option value="2">Cyan Glow</option>
    <option value="3">Gold</option>
    <option value="4">Ice</option>
    <option value="5">Fire</option>
    <option value="6">White</option>
  </select>
  <label><input type="checkbox" id="chkGlow"> Glow</label>
  <div class="sep"></div>
  <select id="selPreset">
    <option value="-1">— Preset —</option>
    <option value="0">Classic Star</option>
    <option value="1">Petals</option>
    <option value="2">Chaos Spiral</option>
    <option value="3">Harmonic Decay</option>
    <option value="4">Lissajous 3:4</option>
    <option value="5">Maurer 71°</option>
    <option value="6">Rose 7/3</option>
    <option value="7">Tight Weave</option>
  </select>
  <button id="btnReset">Reset (R)</button>
  <button id="btnExport">PNG</button>
</div>
<canvas id="c"></canvas>
<div id="info">space=pause · r=reset with new params · scroll=P1 · shift+scroll=P2 · 5 modes × 7 colors</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, maxR;

function resize() {
  canvas.width = W = window.innerWidth;
  canvas.height = H = window.innerHeight - canvas.getBoundingClientRect().top;
  cx = W / 2; cy = H / 2;
  maxR = Math.min(W, H) * 0.42;
}
resize();
window.addEventListener('resize', () => { resize(); reset(); });

// ── State ────────────────────────────────────────────────────────
let mode = 'spiro';
let p1 = 5, p2 = 3, p3 = 0.6; // meaning depends on mode
let speed = 15, lineWidth = 1, colorIdx = 0, glow = false;
let t = 0, paused = false;
let prevX = null, prevY = null;

// ── Curve functions ──────────────────────────────────────────────
// Each returns [x, y] in [-1, 1] range (scaled later)

function spirograph(t) {
  // Hypotrochoid: R=outer, r=inner, d=pen distance
  const R = 1, r = 1 / p1, d = p3 * r;
  const x = (R - r) * Math.cos(t) + d * Math.cos((R - r) / r * t);
  const y = (R - r) * Math.sin(t) - d * Math.sin((R - r) / r * t);
  return [x, y];
}

function harmonograph(t) {
  // Damped pendulum
  const decay = Math.exp(-t * 0.0008);
  const x = Math.sin(t * p1 * 0.3 + 0.5) * decay + Math.sin(t * p2 * 0.17) * decay * 0.5;
  const y = Math.sin(t * p1 * 0.23 + 1.2) * decay + Math.cos(t * p2 * 0.31) * decay * 0.5;
  return [x * 0.65, y * 0.65];
}

function lissajous(t) {
  const x = Math.sin(p1 * t + p3 * Math.PI);
  const y = Math.sin(p2 * t);
  return [x * 0.85, y * 0.85];
}

function roseCurve(t) {
  const k = p1 / p2;
  const r = Math.cos(k * t) * 0.9;
  return [r * Math.cos(t), r * Math.sin(t)];
}

function maurerRose(t) {
  // Maurer rose: connect points at n*d degrees
  const k = p1 / p2;
  const d = Math.round(p3 * 120); // degree step
  const theta = t * d * Math.PI / 180;
  const r = Math.sin(k * theta) * 0.9;
  return [r * Math.cos(theta), r * Math.sin(theta)];
}

const MODES = { spiro: spirograph, harmo: harmonograph, lissajous, rose: roseCurve, maurer: maurerRose };

// ── Colors ───────────────────────────────────────────────────────
function getColor(t) {
  switch (colorIdx) {
    case 0: return `hsl(${(t * 8) % 360},80%,60%)`; // Rainbow
    case 1: return `hsl(${320 + Math.sin(t * 0.02) * 20},100%,65%)`; // Neon Pink
    case 2: return `hsl(${180 + Math.sin(t * 0.03) * 15},80%,55%)`; // Cyan
    case 3: return `hsl(${40 + Math.sin(t * 0.02) * 10},85%,55%)`; // Gold
    case 4: return `hsl(${200 + Math.sin(t * 0.015) * 20},60%,${55 + Math.sin(t * 0.04) * 15}%)`; // Ice
    case 5: return `hsl(${Math.sin(t * 0.01) * 30 + 15},90%,50%)`; // Fire
    case 6: return `rgba(200,200,220,${0.6 + Math.sin(t * 0.02) * 0.3})`; // White
    default: return '#fff';
  }
}

// ── Drawing ──────────────────────────────────────────────────────
function drawSegment() {
  const fn = MODES[mode];
  const stepsPerFrame = speed;

  for (let i = 0; i < stepsPerFrame; i++) {
    const [nx, ny] = fn(t);
    const px = cx + nx * maxR;
    const py = cy + ny * maxR;

    if (prevX !== null) {
      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(px, py);
      ctx.strokeStyle = getColor(t);
      ctx.lineWidth = lineWidth;

      if (glow) {
        ctx.shadowColor = getColor(t);
        ctx.shadowBlur = 8;
      } else {
        ctx.shadowBlur = 0;
      }

      ctx.stroke();
    }

    prevX = px; prevY = py;
    t += 0.02;
  }
}

// ── Loop ─────────────────────────────────────────────────────────
function loop() {
  if (!paused) {
    drawSegment();
  }
  requestAnimationFrame(loop);
}

function reset() {
  ctx.fillStyle = '#020206';
  ctx.fillRect(0, 0, W, H);
  t = 0;
  prevX = null; prevY = null;
}

// ── Presets ───────────────────────────────────────────────────────
const PRESETS = [
  { mode:'spiro', p1:5, p2:3, p3:0.6, color:0, glow:false, lw:1 },    // Classic Star
  { mode:'spiro', p1:7, p2:4, p3:0.8, color:1, glow:true, lw:0.8 },   // Petals
  { mode:'spiro', p1:17, p2:11, p3:0.45, color:0, glow:false, lw:0.5 }, // Chaos Spiral
  { mode:'harmo', p1:7, p2:9, p3:0.5, color:2, glow:true, lw:0.8 },    // Harmonic Decay
  { mode:'lissajous', p1:3, p2:4, p3:0.5, color:3, glow:false, lw:1.2 }, // Lissajous 3:4
  { mode:'maurer', p1:6, p2:1, p3:0.59, color:4, glow:false, lw:0.5 },  // Maurer 71°
  { mode:'rose', p1:7, p2:3, p3:0.5, color:5, glow:true, lw:1 },       // Rose 7/3
  { mode:'spiro', p1:23, p2:7, p3:0.35, color:6, glow:false, lw:0.4 }, // Tight Weave
];

function applyPreset(idx) {
  const p = PRESETS[idx];
  mode = p.mode; p1 = p.p1; p2 = p.p2; p3 = p.p3;
  colorIdx = p.color; glow = p.glow; lineWidth = p.lw;
  document.getElementById('selMode').value = mode;
  document.getElementById('rngP1').value = p1;
  document.getElementById('rngP2').value = p2;
  document.getElementById('rngP3').value = p3;
  document.getElementById('selColor').value = colorIdx;
  document.getElementById('chkGlow').checked = glow;
  document.getElementById('rngWidth').value = lineWidth;
  reset();
}

// ── Controls ─────────────────────────────────────────────────────
document.getElementById('selMode').addEventListener('change', e => { mode = e.target.value; reset(); });
document.getElementById('rngP1').addEventListener('input', e => { p1 = parseInt(e.target.value); reset(); });
document.getElementById('rngP2').addEventListener('input', e => { p2 = parseInt(e.target.value); reset(); });
document.getElementById('rngP3').addEventListener('input', e => { p3 = parseFloat(e.target.value); reset(); });
document.getElementById('rngSpeed').addEventListener('input', e => { speed = parseInt(e.target.value); });
document.getElementById('rngWidth').addEventListener('input', e => { lineWidth = parseFloat(e.target.value); });
document.getElementById('selColor').addEventListener('change', e => { colorIdx = parseInt(e.target.value); });
document.getElementById('chkGlow').addEventListener('change', e => { glow = e.target.checked; });
document.getElementById('selPreset').addEventListener('change', e => {
  const i = parseInt(e.target.value); if (i < 0) return;
  applyPreset(i);
  e.target.value = '-1';
});
document.getElementById('btnReset').addEventListener('click', reset);
document.getElementById('btnExport').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'spirograph.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.shiftKey) {
    p2 = Math.max(1, Math.min(30, p2 + (e.deltaY > 0 ? -1 : 1)));
    document.getElementById('rngP2').value = p2;
  } else {
    p1 = Math.max(1, Math.min(30, p1 + (e.deltaY > 0 ? -1 : 1)));
    document.getElementById('rngP1').value = p1;
  }
  reset();
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  if (e.key === ' ') { e.preventDefault(); paused = !paused; }
  if (e.key === 'r' || e.key === 'R') reset();
  if (e.key === 'g') { glow = !glow; document.getElementById('chkGlow').checked = glow; }
  if (e.key === 'e') document.getElementById('btnExport').click();
});

// ── Init ─────────────────────────────────────────────────────────
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
