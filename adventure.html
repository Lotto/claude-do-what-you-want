<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #c8c8c8;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #header {
    text-align: center;
    padding: 8px;
    color: #666;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-bottom: 1px solid #1a1a1a;
  }
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    line-height: 1.7;
    scroll-behavior: smooth;
  }
  #log .room-name { color: #e8c060; font-weight: bold; }
  #log .desc { color: #aaa; }
  #log .item { color: #60c060; }
  #log .enemy { color: #c06060; }
  #log .cmd { color: #6080c0; }
  #log .good { color: #60c080; }
  #log .bad { color: #c06060; }
  #log .info { color: #808080; }
  #log .win { color: #ffd700; font-size: 1rem; }
  #log .sep { color: #333; }
  #sidebar {
    width: 200px;
    border-left: 1px solid #1a1a1a;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }
  #sidebar h3 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px; }
  #map-grid { font-size: 0.7rem; line-height: 1.4; color: #555; }
  #map-grid .cur { color: #ffd700; }
  #map-grid .vis { color: #888; }
  #map-grid .unvis { color: #222; }
  #stats div { font-size: 0.75rem; margin-bottom: 3px; }
  #stats .hp { color: #c06060; }
  #stats .gold { color: #c0a020; }
  #inv-list { font-size: 0.75rem; color: #60c060; line-height: 1.6; }
  #input-row {
    display: flex;
    border-top: 1px solid #1a1a1a;
    padding: 8px 12px;
    gap: 8px;
    align-items: center;
  }
  #prompt { color: #555; flex-shrink: 0; }
  #cmd {
    flex: 1;
    background: transparent;
    border: none;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    caret-color: #ffd700;
  }
</style>
</head>
<body>
<div id="header">Dungeon &mdash; a procedurally generated text adventure</div>
<div id="main">
  <div id="log"></div>
  <div id="sidebar">
    <div>
      <h3>Map</h3>
      <div id="map-grid"></div>
    </div>
    <div id="stats">
      <h3>Status</h3>
      <div class="hp">HP: <span id="hp">20</span>/20</div>
      <div class="gold">Gold: <span id="gold">0</span></div>
      <div style="color:#888">Depth: <span id="depth">1</span></div>
    </div>
    <div>
      <h3>Inventory</h3>
      <div id="inv-list">empty</div>
    </div>
    <div>
      <h3>Exits</h3>
      <div id="exits-list" style="font-size:0.75rem;color:#8ab;line-height:1.7"></div>
    </div>
  </div>
</div>
<div id="input-row">
  <span id="prompt">&gt;</span>
  <input id="cmd" type="text" autocomplete="off" autofocus placeholder="type a command...">
</div>

<script>
// ─── World Generation ───────────────────────────────────────────
const DIRS = ['north','south','east','west'];
const OPP  = { north:'south', south:'north', east:'west', west:'east' };
const DV   = { north:[0,-1], south:[0,1], east:[1,0], west:[-1,0] };

const ROOM_TYPES = [
  { name:'Entrance Hall',   desc:'Crumbling stone arches frame a heavy iron door behind you. Torchlight flickers.' },
  { name:'Dark Corridor',   desc:'A narrow passage. Water drips from the ceiling, pooling on uneven flagstones.' },
  { name:'Guard Chamber',   desc:'Rusted weapons hang on the walls. A broken portcullis gathers cobwebs.' },
  { name:'Crypt',           desc:'Stone sarcophagi line the walls. The air smells of ancient dust and damp cloth.' },
  { name:'Armory',          desc:'Empty weapon racks and a shattered forge. Something valuable may still remain.' },
  { name:'Library',         desc:'Shelves of rotting tomes. Pages flutter despite the stillness of the air.' },
  { name:'Torture Chamber', desc:'You\'d rather not look too closely at the implements rusting in the corner.' },
  { name:'Chapel',          desc:'A defaced altar holds a cold candle. Faded frescoes peer down from the walls.' },
  { name:'Ossuary',         desc:'Bones are stacked floor to ceiling with grim precision. Some seem freshly placed.' },
  { name:'Flooded Hall',    desc:'Ankle-deep black water covers the floor. Your footsteps echo oddly here.' },
  { name:'Throne Room',     desc:'A grand but decayed throne dominates the room. Something glints on the seat.' },
  { name:'Wizard\'s Study', desc:'Alchemical apparatus gathers dust on a long bench. A faint smell of sulphur.' },
  { name:'Barracks',        desc:'Rotting bunks, scattered bones, and an upturned dice game tell a grim story.' },
  { name:'Vault',           desc:'The massive iron door hangs ajar. Whatever was here, most of it is gone.' },
  { name:'Garden',          desc:'Pale fungi grow in neat rows where herbs once thrived. Bioluminescent and eerie.' },
];

const ITEMS = [
  { name:'torch',     desc:'A sputtering torch. Keeps the dark at bay.',       use:'The torch flares brighter for a moment.' },
  { name:'sword',     desc:'A short iron sword, still sharp.',                  use:'You slash at the air. Satisfying.' },
  { name:'potion',    desc:'A red vial — likely a healing potion.',             use:'heal', heal:8 },
  { name:'key',       desc:'A heavy iron key engraved with a serpent.',         use:'You turn the key, but there\'s nothing to unlock here.' },
  { name:'scroll',    desc:'A brittle scroll. The text shifts as you read it.', use:'The scroll crumbles to ash. You feel briefly wise.' },
  { name:'dagger',    desc:'A slim blade, well-balanced.',                      use:'You flip the dagger. It lands perfectly.' },
  { name:'lantern',   desc:'An oil lantern, still half-full.',                  use:'Warm light fills the room.' },
  { name:'gold coin', desc:'A single gold coin, surprisingly heavy.',           use:'You flip it. Heads.', gold:5 },
  { name:'amulet',    desc:'An obsidian amulet on a silver chain.',             use:'It grows warm at your touch. Nothing else happens.' },
  { name:'map',       desc:'A partial map of the dungeon — already outdated.',  use:'You study the map. Rooms shimmer into view.', revealMap:true },
];

const ENEMIES = [
  { name:'skeleton',  hp:6,  dmg:[1,4], reward:'a cracked bone',  gold:2  },
  { name:'goblin',    hp:8,  dmg:[2,5], reward:'a rusty coin',     gold:4  },
  { name:'giant rat', hp:4,  dmg:[1,3], reward:'some grey fur',    gold:1  },
  { name:'wraith',    hp:12, dmg:[3,6], reward:'a wisp of shadow', gold:8  },
  { name:'troll',     hp:18, dmg:[4,8], reward:'a troll\'s tooth', gold:12 },
];

function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr)  { return arr[rnd(0, arr.length - 1)]; }
function chance(p)  { return Math.random() < p; }

function generateDungeon() {
  // Build a 7x5 grid, carve connected rooms
  const GW = 7, GH = 5;
  const grid = Array.from({length: GH}, () => Array(GW).fill(null));
  const rooms = [];

  // Place rooms by random walk from center
  const cx = 3, cy = 2;
  const queue = [[cx, cy]];
  const placed = new Set();
  placed.add(`${cx},${cy}`);

  while (queue.length && rooms.length < 18) {
    const [x, y] = queue.splice(rnd(0, queue.length-1), 1)[0];
    const type = rooms.length === 0
      ? ROOM_TYPES[0]  // entrance first
      : pick(ROOM_TYPES.slice(1));

    const room = {
      id: rooms.length, x, y,
      name: type.name, desc: type.desc,
      exits: {}, item: null, enemy: null,
      visited: false,
    };
    grid[y][x] = room;
    rooms.push(room);

    for (const dir of DIRS) {
      const [dx, dy] = DV[dir];
      const nx = x + dx, ny = y + dy;
      if (nx < 0 || nx >= GW || ny < 0 || ny >= GH) continue;
      if (!placed.has(`${nx},${ny}`) && chance(0.6)) {
        placed.add(`${nx},${ny}`);
        queue.push([nx, ny]);
      }
    }
  }

  // Connect adjacent rooms
  for (const room of rooms) {
    for (const dir of DIRS) {
      const [dx, dy] = DV[dir];
      const nx = room.x + dx, ny = room.y + dy;
      if (nx < 0 || nx >= GW || ny < 0 || ny >= GH) continue;
      const neighbor = grid[ny] && grid[ny][nx];
      if (neighbor) room.exits[dir] = neighbor.id;
    }
  }

  // Ensure connectivity from room 0 via BFS
  const reachable = new Set([0]);
  const bfsQ = [0];
  while (bfsQ.length) {
    const cur = rooms[bfsQ.shift()];
    for (const nid of Object.values(cur.exits)) {
      if (!reachable.has(nid)) { reachable.add(nid); bfsQ.push(nid); }
    }
  }

  // Scatter items and enemies
  const itemPool = [...ITEMS].sort(() => Math.random()-0.5);
  const enemyPool = [...ENEMIES].sort(() => Math.random()-0.5);
  let ii = 0, ei = 0;
  for (let i = 1; i < rooms.length; i++) {
    const r = rooms[i];
    if (!reachable.has(r.id)) continue;
    if (chance(0.45) && ii < itemPool.length) r.item = {...itemPool[ii++]};
    if (chance(0.40) && ei < enemyPool.length) r.enemy = {...enemyPool[ei++]};
  }

  // Place the Crown in a deep room (highest Manhattan distance from entrance)
  const entrance = rooms[0];
  let furthest = rooms[1];
  for (const r of rooms) {
    if (!reachable.has(r.id)) continue;
    const d = Math.abs(r.x - entrance.x) + Math.abs(r.y - entrance.y);
    const df = Math.abs(furthest.x - entrance.x) + Math.abs(furthest.y - entrance.y);
    if (d > df) furthest = r;
  }
  furthest.item = { name:'Crown of the Dungeon Lord', desc:'A heavy crown of black iron set with a single red gem. This is what you came for.', use:'You place the crown on your head. Power... and nausea.', isCrown:true };
  furthest.name = 'Throne Room';
  furthest.desc = ROOM_TYPES[10].desc;

  return { rooms, grid, GW, GH };
}

// ─── Game State ─────────────────────────────────────────────────
let world, player, cmdHistory, histIdx;

function init() {
  world = generateDungeon();
  player = { roomId: 0, hp: 20, maxHp: 20, gold: 0, inventory: [], hasCrown: false, won: false };
  cmdHistory = [];
  histIdx = -1;
  world.rooms[0].visited = true;
  log('');
  log('<span class="win">DUNGEON</span>');
  log('<span class="info">You descend into the darkness in search of the Crown of the Dungeon Lord.</span>');
  log('<span class="info">Type <b>help</b> to see commands.</span>');
  log('');
  describeRoom();
  updateSidebar();
}

// ─── Output ─────────────────────────────────────────────────────
function log(html) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.innerHTML = html;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function describeRoom(brief=false) {
  const r = currentRoom();
  log(`<span class="room-name">${r.name}</span>`);
  if (!brief) log(`<span class="desc">${r.desc}</span>`);
  if (r.item) log(`<span class="item">You see: ${r.item.name}.</span>`);
  if (r.enemy) log(`<span class="enemy">A ${r.enemy.name} lurks here! (${r.enemy.hp} HP)</span>`);
  const exits = Object.keys(r.exits);
  log(`<span class="info">Exits: ${exits.length ? exits.join(', ') : 'none'}.</span>`);
}

// ─── Helpers ────────────────────────────────────────────────────
function currentRoom() { return world.rooms[player.roomId]; }

function updateSidebar() {
  document.getElementById('hp').textContent = player.hp;
  document.getElementById('gold').textContent = player.gold;
  // depth = manhattan from entrance
  const r = currentRoom(), e = world.rooms[0];
  document.getElementById('depth').textContent = Math.abs(r.x-e.x)+Math.abs(r.y-e.y)+1;
  document.getElementById('inv-list').innerHTML =
    player.inventory.length ? player.inventory.map(i=>`<span class="item">${i.name}</span>`).join('<br>') : 'empty';
  document.getElementById('exits-list').innerHTML =
    Object.keys(currentRoom().exits).join('<br>') || '(none)';
  drawMap();
}

function drawMap() {
  const { rooms, GW, GH } = world;
  const grid = Array.from({length: GH}, () => Array(GW).fill(null));
  for (const r of rooms) grid[r.y][r.x] = r;
  const cur = currentRoom();
  let html = '';
  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW; x++) {
      const r = grid[y][x];
      if (!r) { html += '<span class="unvis">  </span>'; continue; }
      const isCur = r.id === player.roomId;
      const cls = isCur ? 'cur' : r.visited ? 'vis' : 'unvis';
      const ch = isCur ? '[@]' : r.visited ? '[.]' : '[?]';
      // Show connections
      html += `<span class="${cls}">${ch}</span>`;
    }
    html += '<br>';
  }
  document.getElementById('map-grid').innerHTML = html;
}

// ─── Commands ───────────────────────────────────────────────────
function handleCommand(raw) {
  const input = raw.trim().toLowerCase();
  if (!input) return;
  log(`<span class="cmd">&gt; ${raw}</span>`);

  if (player.won) { log('<span class="info">You have won! Type <b>restart</b> to play again.</span>'); return; }

  const parts = input.split(/\s+/);
  const verb = parts[0];
  const rest = parts.slice(1).join(' ');

  if (verb === 'help') {
    log(`<span class="info">Commands: go [dir] &bull; look &bull; take [item] &bull; drop [item] &bull; inventory (i) &bull; examine [item] &bull; use [item] &bull; attack (a) &bull; flee (f) &bull; map &bull; restart</span>`);
  }
  else if (verb === 'restart') { init(); }
  else if (verb === 'look') { describeRoom(); }
  else if (verb === 'map') { drawMap(); log('<span class="info">[@] you &bull; [.] visited &bull; [?] unknown</span>'); }
  else if (verb === 'inventory' || verb === 'i') {
    if (!player.inventory.length) log('<span class="info">You are carrying nothing.</span>');
    else log('<span class="item">Carrying: ' + player.inventory.map(i=>i.name).join(', ') + '</span>');
  }
  else if (verb === 'go' || DIRS.includes(verb)) {
    const dir = DIRS.includes(verb) ? verb : rest;
    doGo(dir);
  }
  else if (verb === 'take' || verb === 'get' || verb === 'pick') {
    doTake(rest.replace(/^up\s*/,''));
  }
  else if (verb === 'drop') { doDrop(rest); }
  else if (verb === 'examine' || verb === 'x' || verb === 'inspect') { doExamine(rest); }
  else if (verb === 'use') { doUse(rest); }
  else if (verb === 'attack' || verb === 'a' || verb === 'fight' || verb === 'kill') { doAttack(); }
  else if (verb === 'flee' || verb === 'f' || verb === 'run' || verb === 'escape') { doFlee(); }
  else { log('<span class="info">Unknown command. Type <b>help</b> for a list.</span>'); }

  updateSidebar();
}

function doGo(dir) {
  if (!DIRS.includes(dir)) { log('<span class="info">Go where? (north/south/east/west)</span>'); return; }
  const r = currentRoom();
  if (r.enemy) { log(`<span class="bad">The ${r.enemy.name} blocks your path! Deal with it first, or <b>flee</b>.</span>`); return; }
  if (!r.exits[dir]) { log('<span class="info">You can\'t go that way.</span>'); return; }
  player.roomId = r.exits[dir];
  const nr = currentRoom();
  nr.visited = true;
  log('');
  describeRoom(!nr.visited);

  // Win condition: return to entrance with crown
  if (player.hasCrown && player.roomId === 0) {
    log('');
    log('<span class="win">*** You escape the dungeon with the Crown of the Dungeon Lord! ***</span>');
    log('<span class="win">Victory. Type <b>restart</b> to descend again.</span>');
    player.won = true;
  }
}

function doTake(name) {
  const r = currentRoom();
  if (!r.item) { log('<span class="info">There is nothing here to take.</span>'); return; }
  if (name && !r.item.name.toLowerCase().includes(name)) {
    log(`<span class="info">You don't see a "${name}" here.</span>`); return;
  }
  if (r.item.gold) player.gold += r.item.gold;
  if (r.item.isCrown) {
    player.hasCrown = true;
    log('<span class="win">You take the Crown of the Dungeon Lord. Now escape!</span>');
  } else {
    log(`<span class="good">You take the ${r.item.name}.</span>`);
  }
  player.inventory.push(r.item);
  r.item = null;
}

function doDrop(name) {
  const idx = player.inventory.findIndex(i => i.name.toLowerCase().includes(name));
  if (idx === -1) { log(`<span class="info">You're not carrying that.</span>`); return; }
  const item = player.inventory.splice(idx, 1)[0];
  if (item.isCrown) player.hasCrown = false;
  currentRoom().item = item;
  log(`<span class="info">You drop the ${item.name}.</span>`);
}

function doExamine(name) {
  if (!name) { describeRoom(); return; }
  // Check inventory first, then room
  const item = player.inventory.find(i => i.name.toLowerCase().includes(name))
            || (currentRoom().item?.name.toLowerCase().includes(name) ? currentRoom().item : null);
  if (!item) { log(`<span class="info">You don't see a "${name}" here.</span>`); return; }
  log(`<span class="desc">${item.desc}</span>`);
}

function doUse(name) {
  const idx = player.inventory.findIndex(i => i.name.toLowerCase().includes(name));
  if (idx === -1) { log(`<span class="info">You're not carrying that.</span>`); return; }
  const item = player.inventory[idx];
  if (item.use === 'heal') {
    const gained = Math.min(item.heal, player.maxHp - player.hp);
    player.hp = Math.min(player.maxHp, player.hp + item.heal);
    log(`<span class="good">You drink the potion and recover ${gained} HP.</span>`);
    player.inventory.splice(idx, 1);
  } else if (item.revealMap) {
    for (const r of world.rooms) r.visited = true;
    log('<span class="good">The map shimmers. All rooms revealed.</span>');
    player.inventory.splice(idx, 1);
  } else {
    log(`<span class="info">${item.use}</span>`);
  }
}

function doAttack() {
  const r = currentRoom();
  if (!r.enemy) { log('<span class="info">There is nothing to fight here.</span>'); return; }
  const e = r.enemy;
  const hasSword = player.inventory.some(i => i.name === 'sword' || i.name === 'dagger');
  const pDmg = hasSword ? rnd(3, 8) : rnd(1, 4);
  e.hp -= pDmg;
  log(`<span class="good">You hit the ${e.name} for ${pDmg} damage. (${Math.max(0,e.hp)} HP left)</span>`);
  if (e.hp <= 0) {
    log(`<span class="good">The ${e.name} collapses. You find ${e.reward} and ${e.gold} gold.</span>`);
    player.gold += e.gold;
    r.enemy = null;
    return;
  }
  // Enemy retaliates
  const eDmg = rnd(e.dmg[0], e.dmg[1]);
  player.hp -= eDmg;
  log(`<span class="bad">The ${e.name} hits you for ${eDmg} damage. (${player.hp} HP remaining)</span>`);
  if (player.hp <= 0) {
    player.hp = 0;
    log('');
    log('<span class="bad">*** You have died. ***</span>');
    log('<span class="bad">Type <b>restart</b> to try again.</span>');
    player.won = true; // lock input
  }
}

function doFlee() {
  const r = currentRoom();
  if (!r.enemy) { log('<span class="info">Nothing to flee from.</span>'); return; }
  const exits = Object.entries(r.exits);
  if (!exits.length) { log('<span class="bad">Nowhere to run!</span>'); return; }
  const [dir, nid] = pick(exits);
  const dmg = rnd(1, 3);
  player.hp = Math.max(1, player.hp - dmg);
  log(`<span class="bad">You flee ${dir}, taking ${dmg} damage as you go.</span>`);
  player.roomId = nid;
  world.rooms[nid].visited = true;
  describeRoom();
}

// ─── Input ──────────────────────────────────────────────────────
const cmdEl = document.getElementById('cmd');
cmdEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = cmdEl.value;
    if (v.trim()) cmdHistory.unshift(v);
    histIdx = -1;
    cmdEl.value = '';
    handleCommand(v);
  } else if (e.key === 'ArrowUp') {
    histIdx = Math.min(histIdx + 1, cmdHistory.length - 1);
    cmdEl.value = cmdHistory[histIdx] || '';
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    histIdx = Math.max(histIdx - 1, -1);
    cmdEl.value = histIdx === -1 ? '' : cmdHistory[histIdx];
    e.preventDefault();
  }
});

init();
</script>
</body>
</html>
