<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020206; color: #a0a0b0; font: 11px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
  #top { padding: 7px 14px; background: #06060a; border-bottom: 1px solid #10101c; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
  h1 { font-size: 12px; color: #b0b0c8; letter-spacing: 0.2em; text-transform: uppercase; }
  button { background: #0c0c16; border: 1px solid #222236; color: #7070a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; }
  button:hover { background: #12122a; color: #a0a0c8; }
  button.active { background: #1a3060; color: #80c0ff; border-color: #3060a0; }
  select { background: #0c0c16; border: 1px solid #222236; color: #7070a0; font: 11px 'Courier New', monospace; padding: 2px 5px; }
  .sep { width: 1px; height: 18px; background: #141422; margin: 0 1px; }
  label { color: #505068; font-size: 11px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  #main { flex: 1; display: flex; overflow: hidden; }
  #toolbar { width: 44px; background: #04040a; border-right: 1px solid #10101c; display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 4px; flex-shrink: 0; }
  .tool-btn { width: 32px; height: 32px; background: #0a0a14; border: 1px solid #1a1a2c; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #606080; font-size: 14px; }
  .tool-btn:hover { background: #12122a; color: #a0a0c8; }
  .tool-btn.active { background: #1a3060; color: #80c0ff; border-color: #3060a0; }
  #canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  canvas { image-rendering: pixelated; cursor: crosshair; }
  #sidebar { width: 180px; background: #04040a; border-left: 1px solid #10101c; padding: 10px; flex-shrink: 0; overflow-y: auto; }
  #sidebar h2 { font-size: 10px; color: #606080; letter-spacing: 0.12em; text-transform: uppercase; margin: 10px 0 6px; }
  #sidebar h2:first-child { margin-top: 0; }
  #colorPicker { width: 100%; height: 28px; border: 1px solid #222236; background: none; cursor: pointer; margin-bottom: 6px; }
  .palette { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 8px; }
  .swatch { width: 18px; height: 18px; border: 1px solid #1a1a2c; cursor: pointer; border-radius: 2px; }
  .swatch.active { border: 2px solid #80c0ff; }
  .swatch:hover { border-color: #4060a0; }
  #preview { width: 100%; image-rendering: pixelated; border: 1px solid #1a1a2c; margin-top: 6px; }
  #info { position: absolute; bottom: 8px; left: 56px; font-size: 10px; color: #1a1a30; pointer-events: none; }
  .checkerboard { background-image: repeating-conic-gradient(#181820 0% 25%, #0e0e16 0% 50%); }
</style>
</head>
<body>
<div id="top">
  <h1>Pixel Art</h1>
  <div class="sep"></div>
  <select id="selSize">
    <option value="16">16×16</option>
    <option value="32" selected>32×32</option>
    <option value="48">48×48</option>
    <option value="64">64×64</option>
  </select>
  <div class="sep"></div>
  <button id="btnUndo">Undo (Z)</button>
  <button id="btnRedo">Redo (Y)</button>
  <div class="sep"></div>
  <button id="btnGrid">Grid</button>
  <button id="btnMirror">Mirror</button>
  <div class="sep"></div>
  <button id="btnClear">Clear</button>
  <button id="btnExport">Export PNG</button>
  <span id="lblCoord" style="font-size:10px;color:#404060;margin-left:8px"></span>
</div>
<div id="main">
  <div id="toolbar">
    <div class="tool-btn active" data-tool="pen" title="Pen (B)">✏</div>
    <div class="tool-btn" data-tool="eraser" title="Eraser (E)">◻</div>
    <div class="tool-btn" data-tool="fill" title="Fill (G)">◈</div>
    <div class="tool-btn" data-tool="line" title="Line (L)">╱</div>
    <div class="tool-btn" data-tool="rect" title="Rect (R)">▭</div>
    <div class="tool-btn" data-tool="circle" title="Circle (C)">○</div>
    <div class="tool-btn" data-tool="pick" title="Color Pick (I)">◉</div>
  </div>
  <div id="canvas-wrap" class="checkerboard">
    <canvas id="c"></canvas>
  </div>
  <div id="sidebar">
    <h2>Color</h2>
    <input type="color" id="colorPicker" value="#ff4466">
    <div class="palette" id="palette"></div>
    <h2>Recent</h2>
    <div class="palette" id="recent"></div>
    <h2>Preview</h2>
    <canvas id="preview"></canvas>
  </div>
</div>
<div id="info">LMB=draw · RMB=erase · scroll=zoom · shift+drag=pan</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const previewCanvas = document.getElementById('preview');
const previewCtx = previewCanvas.getContext('2d');

// ── State ────────────────────────────────────────────────────────
let gridSize = 32;
let pixels; // Uint32Array (ABGR packed for ImageData)
let pixelColors; // string array for easier comparison
let tool = 'pen';
let color = '#ff4466';
let showGrid = true;
let mirrorX = false;
let zoom = 12;
let panX = 0, panY = 0;
let undoStack = [], redoStack = [];
let recentColors = [];
let drawing = false, startCell = null;
let shiftPan = false, panStart = null;

const DEFAULT_PALETTE = [
  '#000000','#1a1a2e','#16213e','#0f3460','#533483','#e94560','#ff6b6b','#ffa502',
  '#ffda79','#67e480','#2ed573','#1e90ff','#70a1ff','#7bed9f','#ffffff','#dfe6e9',
  '#b2bec3','#636e72','#2d3436','#d63031','#e17055','#fdcb6e','#00b894','#00cec9',
  '#6c5ce7','#a29bfe','#fd79a8','#fab1a0','#55efc4','#74b9ff','#81ecec','#dfe6e9',
];

function initPixels() {
  pixels = new Uint32Array(gridSize * gridSize);
  pixelColors = new Array(gridSize * gridSize).fill('');
  undoStack = [];
  redoStack = [];
  updateCanvas();
}

// ── Canvas sizing ────────────────────────────────────────────────
function updateCanvasSize() {
  const totalPx = gridSize * zoom;
  canvas.width = totalPx;
  canvas.height = totalPx;
  canvas.style.width = totalPx + 'px';
  canvas.style.height = totalPx + 'px';
}

function updateCanvas() {
  updateCanvasSize();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw pixels
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      const c = pixelColors[y * gridSize + x];
      if (c) {
        ctx.fillStyle = c;
        ctx.fillRect(x * zoom, y * zoom, zoom, zoom);
      }
    }
  }

  // Grid
  if (showGrid && zoom >= 4) {
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= gridSize; i++) {
      ctx.beginPath();
      ctx.moveTo(i * zoom, 0); ctx.lineTo(i * zoom, gridSize * zoom);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * zoom); ctx.lineTo(gridSize * zoom, i * zoom);
      ctx.stroke();
    }
  }

  updatePreview();
}

function updatePreview() {
  const s = 4;
  previewCanvas.width = gridSize * s;
  previewCanvas.height = gridSize * s;
  previewCanvas.style.width = '100%';
  previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      const c = pixelColors[y * gridSize + x];
      if (c) {
        previewCtx.fillStyle = c;
        previewCtx.fillRect(x * s, y * s, s, s);
      }
    }
  }
}

// ── Undo/Redo ────────────────────────────────────────────────────
function saveUndo() {
  undoStack.push(pixelColors.slice());
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(pixelColors.slice());
  pixelColors = undoStack.pop();
  updateCanvas();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(pixelColors.slice());
  pixelColors = redoStack.pop();
  updateCanvas();
}

// ── Drawing operations ───────────────────────────────────────────
function setPixel(x, y, c) {
  if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) return;
  pixelColors[y * gridSize + x] = c;
  if (mirrorX) {
    const mx = gridSize - 1 - x;
    pixelColors[y * gridSize + mx] = c;
  }
}

function getPixel(x, y) {
  if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) return '';
  return pixelColors[y * gridSize + x];
}

function floodFill(sx, sy, newColor) {
  const target = getPixel(sx, sy);
  if (target === newColor) return;
  const stack = [[sx, sy]];
  const visited = new Set();
  while (stack.length > 0) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) continue;
    const key = y * gridSize + x;
    if (visited.has(key)) continue;
    if (getPixel(x, y) !== target) continue;
    visited.add(key);
    setPixel(x, y, newColor);
    stack.push([x-1,y],[x+1,y],[x,y-1],[x,y+1]);
  }
}

function drawLine(x0, y0, x1, y1, c) {
  // Bresenham
  const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    setPixel(x0, y0, c);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
  }
}

function drawRect(x0, y0, x1, y1, c) {
  const minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
  const minY = Math.min(y0, y1), maxY = Math.max(y0, y1);
  for (let x = minX; x <= maxX; x++) { setPixel(x, minY, c); setPixel(x, maxY, c); }
  for (let y = minY; y <= maxY; y++) { setPixel(minX, y, c); setPixel(maxX, y, c); }
}

function drawCircle(cx, cy, x1, y1, c) {
  const r = Math.round(Math.hypot(x1 - cx, y1 - cy));
  // Midpoint circle
  let x = r, y = 0, err = 1 - r;
  while (x >= y) {
    setPixel(cx+x,cy+y,c); setPixel(cx-x,cy+y,c);
    setPixel(cx+x,cy-y,c); setPixel(cx-x,cy-y,c);
    setPixel(cx+y,cy+x,c); setPixel(cx-y,cy+x,c);
    setPixel(cx+y,cy-x,c); setPixel(cx-y,cy-x,c);
    y++;
    if (err < 0) { err += 2*y + 1; }
    else { x--; err += 2*(y-x) + 1; }
  }
}

// ── Mouse → cell ─────────────────────────────────────────────────
function mouseToCell(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / zoom);
  const y = Math.floor((e.clientY - rect.top) / zoom);
  return [x, y];
}

// ── Input ────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  if (e.shiftKey) {
    shiftPan = true;
    panStart = { x: e.clientX, y: e.clientY };
    return;
  }

  const [cx, cy] = mouseToCell(e);
  const useColor = e.button === 2 ? '' : color;

  if (tool === 'pick') {
    const c = getPixel(cx, cy);
    if (c) { color = c; document.getElementById('colorPicker').value = c; addRecent(c); }
    return;
  }

  if (tool === 'fill') {
    saveUndo();
    floodFill(cx, cy, useColor);
    addRecent(useColor);
    updateCanvas();
    return;
  }

  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    saveUndo();
    startCell = [cx, cy];
    drawing = true;
    return;
  }

  // Pen / Eraser
  saveUndo();
  drawing = true;
  startCell = [cx, cy];
  setPixel(cx, cy, tool === 'eraser' ? '' : useColor);
  addRecent(useColor);
  updateCanvas();
});

canvas.addEventListener('mousemove', e => {
  const [cx, cy] = mouseToCell(e);
  document.getElementById('lblCoord').textContent = `${cx},${cy}`;

  if (shiftPan && panStart) {
    const wrap = document.getElementById('canvas-wrap');
    // Simple scroll-based pan not needed with centered layout
    panStart = { x: e.clientX, y: e.clientY };
    return;
  }

  if (!drawing) return;

  if (tool === 'pen' || tool === 'eraser') {
    const useColor = e.buttons === 2 ? '' : (tool === 'eraser' ? '' : color);
    // Draw line from previous cell to current for smooth strokes
    if (startCell) {
      drawLine(startCell[0], startCell[1], cx, cy, useColor);
    }
    startCell = [cx, cy];
    updateCanvas();
  } else if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    // Preview: restore from undo and draw shape
    if (undoStack.length > 0) {
      pixelColors = undoStack[undoStack.length - 1].slice();
    }
    const useColor = color;
    if (tool === 'line') drawLine(startCell[0], startCell[1], cx, cy, useColor);
    else if (tool === 'rect') drawRect(startCell[0], startCell[1], cx, cy, useColor);
    else if (tool === 'circle') drawCircle(startCell[0], startCell[1], cx, cy, useColor);
    updateCanvas();
  }
});

canvas.addEventListener('mouseup', e => {
  if (shiftPan) { shiftPan = false; panStart = null; return; }

  if (drawing && (tool === 'line' || tool === 'rect' || tool === 'circle')) {
    const [cx, cy] = mouseToCell(e);
    // Final shape already drawn in mousemove; just finalize
    addRecent(color);
  }
  drawing = false;
  startCell = null;
});

canvas.addEventListener('mouseleave', () => { drawing = false; startCell = null; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Zoom
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  if (e.deltaY < 0) zoom = Math.min(32, zoom + 1);
  else zoom = Math.max(2, zoom - 1);
  updateCanvas();
}, { passive: false });

// ── Palette ──────────────────────────────────────────────────────
function buildPalette() {
  const el = document.getElementById('palette');
  el.innerHTML = '';
  for (const c of DEFAULT_PALETTE) {
    const s = document.createElement('div');
    s.className = 'swatch' + (c === color ? ' active' : '');
    s.style.background = c;
    s.addEventListener('click', () => {
      color = c;
      document.getElementById('colorPicker').value = c;
      document.querySelectorAll('#palette .swatch').forEach(sw => sw.classList.remove('active'));
      s.classList.add('active');
      addRecent(c);
    });
    el.appendChild(s);
  }
}

function addRecent(c) {
  if (!c) return;
  recentColors = recentColors.filter(r => r !== c);
  recentColors.unshift(c);
  if (recentColors.length > 16) recentColors.pop();
  updateRecent();
}

function updateRecent() {
  const el = document.getElementById('recent');
  el.innerHTML = '';
  for (const c of recentColors) {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.style.background = c;
    s.addEventListener('click', () => {
      color = c;
      document.getElementById('colorPicker').value = c;
    });
    el.appendChild(s);
  }
}

document.getElementById('colorPicker').addEventListener('input', e => {
  color = e.target.value;
  addRecent(color);
});

// ── Tool buttons ─────────────────────────────────────────────────
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    tool = btn.dataset.tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ── Top bar controls ─────────────────────────────────────────────
document.getElementById('selSize').addEventListener('change', e => {
  gridSize = parseInt(e.target.value);
  initPixels();
});

document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);

document.getElementById('btnGrid').addEventListener('click', function() {
  showGrid = !showGrid;
  this.classList.toggle('active', showGrid);
  updateCanvas();
});
document.getElementById('btnGrid').classList.add('active');

document.getElementById('btnMirror').addEventListener('click', function() {
  mirrorX = !mirrorX;
  this.classList.toggle('active', mirrorX);
});

document.getElementById('btnClear').addEventListener('click', () => {
  saveUndo();
  pixelColors.fill('');
  updateCanvas();
});

document.getElementById('btnExport').addEventListener('click', () => {
  const exp = document.createElement('canvas');
  exp.width = gridSize; exp.height = gridSize;
  const ectx = exp.getContext('2d');
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      const c = pixelColors[y * gridSize + x];
      if (c) {
        ectx.fillStyle = c;
        ectx.fillRect(x, y, 1, 1);
      }
    }
  }
  const a = document.createElement('a');
  a.download = 'pixel-art.png';
  a.href = exp.toDataURL('image/png');
  a.click();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const key = e.key.toLowerCase();
  if (key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
  else if (key === 'y' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); redo(); }
  else if (key === 'z' && !e.ctrlKey) undo();
  else if (key === 'y' && !e.ctrlKey) redo();
  else if (key === 'b') selectTool('pen');
  else if (key === 'e') selectTool('eraser');
  else if (key === 'g') selectTool('fill');
  else if (key === 'l') selectTool('line');
  else if (key === 'r') selectTool('rect');
  else if (key === 'c') selectTool('circle');
  else if (key === 'i') selectTool('pick');
  else if (key === 'm') { mirrorX = !mirrorX; document.getElementById('btnMirror').classList.toggle('active', mirrorX); }
});

function selectTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === t);
  });
}

// ── Init ─────────────────────────────────────────────────────────
buildPalette();
initPixels();
</script>
</body>
</html>
