<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfinding Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #a0a0b8; font: 12px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #top { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #0a0a14; border-bottom: 1px solid #141428; flex-shrink: 0; flex-wrap: wrap; }
  h1 { font-size: 11px; color: #808098; letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; }
  .sep { width: 1px; height: 18px; background: #1a1a30; margin: 0 2px; }
  button { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; border-radius: 3px; }
  button:hover { background: #14142a; color: #9090c0; }
  button.active { background: #1a2a50; color: #80b0ff; border-color: #3060a0; }
  select { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; font: 11px 'Courier New', monospace; padding: 2px 6px; border-radius: 3px; }
  label { color: #505068; font-size: 11px; display: flex; align-items: center; gap: 4px; }
  input[type="range"] { width: 70px; accent-color: #4060a0; }

  canvas { display: block; flex: 1; cursor: crosshair; }

  #statusBar { padding: 4px 12px; background: #06060c; border-top: 1px solid #101020; font-size: 10px; color: #303050; display: flex; gap: 16px; flex-shrink: 0; }
  .stat b { color: #505078; font-weight: normal; }
</style>
</head>
<body>

<div id="top">
  <h1>Pathfinding</h1>
  <div class="sep"></div>
  <button id="btnWall" class="active" onclick="setTool('wall')">Wall (W)</button>
  <button id="btnStart" onclick="setTool('start')">Start (S)</button>
  <button id="btnEnd" onclick="setTool('end')">End (E)</button>
  <button id="btnWeight" onclick="setTool('weight')">Weight (G)</button>
  <button id="btnEraser" onclick="setTool('eraser')">Eraser (R)</button>
  <div class="sep"></div>
  <select id="selAlgo" onchange="resetSearch()">
    <option value="astar">A* (Manhattan)</option>
    <option value="astar_euclid">A* (Euclidean)</option>
    <option value="dijkstra">Dijkstra</option>
    <option value="bfs">BFS</option>
    <option value="dfs">DFS</option>
    <option value="greedy">Greedy Best-First</option>
  </select>
  <label><input type="checkbox" id="chkDiag" onchange="resetSearch()"> Diagonals</label>
  <div class="sep"></div>
  <label>Speed: <input type="range" id="rSpeed" min="1" max="200" value="20" oninput="stepsPerFrame=+this.value"> <span id="speedVal">20</span></label>
  <div class="sep"></div>
  <button onclick="startSearch()" id="btnRun">Run</button>
  <button onclick="resetSearch()">Reset</button>
  <button onclick="clearAll()">Clear All</button>
  <div class="sep"></div>
  <select id="selMaze" onchange="generateMaze(this.value);this.value=''">
    <option value="">-- Generate --</option>
    <option value="recursive">Recursive Maze</option>
    <option value="random30">Random 30%</option>
    <option value="random50">Random 50%</option>
    <option value="spiral">Spiral</option>
    <option value="rooms">Rooms</option>
  </select>
</div>

<canvas id="canvas"></canvas>

<div id="statusBar">
  <span class="stat">Visited: <b id="statVisited">0</b></span>
  <span class="stat">Path: <b id="statPath">0</b></span>
  <span class="stat">Cost: <b id="statCost">—</b></span>
  <span class="stat">Time: <b id="statTime">—</b></span>
  <span class="stat">Grid: <b id="statGrid">0x0</b></span>
</div>

<script>
'use strict';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, COLS, ROWS, CELL;

// ── Cell states ─────────────────────────────────────────────────
const EMPTY = 0, WALL = 1, START = 2, END = 3, WEIGHT = 4;
const VISITED = 10, FRONTIER = 11, PATH = 12;

let grid = [];
let startPos = null, endPos = null;
let tool = 'wall';
let mouseDown = false;
let searching = false;
let searchDone = false;
let stepsPerFrame = 20;
let searchGen = null;
let visitedCount = 0;
let pathLength = 0;
let pathCost = 0;
let searchStartTime = 0;

function resize() {
  W = canvas.width = canvas.clientWidth;
  H = canvas.height = canvas.clientHeight;
  CELL = 20;
  COLS = Math.floor(W / CELL);
  ROWS = Math.floor(H / CELL);
  initGrid();
}

function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = { type: EMPTY, state: 0, g: Infinity, f: Infinity, parent: null, weight: 1 };
    }
  }
  // Default start/end
  const sr = Math.floor(ROWS / 2), sc = Math.floor(COLS * 0.2);
  const er = Math.floor(ROWS / 2), ec = Math.floor(COLS * 0.8);
  startPos = { r: sr, c: sc };
  endPos = { r: er, c: ec };
  grid[sr][sc].type = START;
  grid[er][ec].type = END;
  resetSearch();
}

resize();
window.addEventListener('resize', resize);

// ── Tools ───────────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  ['wall','start','end','weight','eraser'].forEach(n =>
    document.getElementById('btn' + n.charAt(0).toUpperCase() + n.slice(1)).classList.toggle('active', n === t));
}

function cellAt(x, y) {
  const c = Math.floor(x / CELL), r = Math.floor(y / CELL);
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return { r, c };
  return null;
}

function applyTool(r, c) {
  if (searching) return;
  const cell = grid[r][c];

  if (tool === 'wall') {
    if (cell.type !== START && cell.type !== END) { cell.type = WALL; cell.weight = 1; }
  } else if (tool === 'eraser') {
    if (cell.type !== START && cell.type !== END) { cell.type = EMPTY; cell.weight = 1; }
  } else if (tool === 'weight') {
    if (cell.type !== START && cell.type !== END && cell.type !== WALL) { cell.type = WEIGHT; cell.weight = 5; }
  } else if (tool === 'start') {
    if (startPos) grid[startPos.r][startPos.c].type = EMPTY;
    cell.type = START; startPos = { r, c };
  } else if (tool === 'end') {
    if (endPos) grid[endPos.r][endPos.c].type = EMPTY;
    cell.type = END; endPos = { r, c };
  }
  resetSearchState();
}

function resetSearchState() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      grid[r][c].state = 0; grid[r][c].g = Infinity;
      grid[r][c].f = Infinity; grid[r][c].parent = null;
    }
  searchDone = false;
  visitedCount = 0; pathLength = 0; pathCost = 0;
}

function resetSearch() {
  searching = false; searchGen = null;
  resetSearchState();
  document.getElementById('btnRun').textContent = 'Run';
}

function clearAll() {
  resetSearch();
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c].type !== START && grid[r][c].type !== END) {
        grid[r][c].type = EMPTY; grid[r][c].weight = 1;
      }
    }
}

// ── Search algorithms ───────────────────────────────────────────
function getNeighbors(r, c) {
  const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
  if (document.getElementById('chkDiag').checked) dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
  const result = [];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc].type !== WALL) {
      const isDiag = dr !== 0 && dc !== 0;
      result.push({ r: nr, c: nc, cost: isDiag ? 1.414 : 1 });
    }
  }
  return result;
}

function heuristic(r1, c1, r2, c2, type) {
  if (type === 'manhattan') return Math.abs(r1 - r2) + Math.abs(c1 - c2);
  if (type === 'euclidean') return Math.sqrt((r1 - r2) ** 2 + (c1 - c2) ** 2);
  return 0;
}

// MinHeap for priority queue
class MinHeap {
  constructor() { this.data = []; }
  push(item) {
    this.data.push(item);
    let i = this.data.length - 1;
    while (i > 0) {
      const p = (i - 1) >> 1;
      if (this.data[p].f <= this.data[i].f) break;
      [this.data[p], this.data[i]] = [this.data[i], this.data[p]];
      i = p;
    }
  }
  pop() {
    const top = this.data[0];
    const last = this.data.pop();
    if (this.data.length > 0) {
      this.data[0] = last;
      let i = 0;
      while (true) {
        let min = i, l = 2*i+1, r = 2*i+2;
        if (l < this.data.length && this.data[l].f < this.data[min].f) min = l;
        if (r < this.data.length && this.data[r].f < this.data[min].f) min = r;
        if (min === i) break;
        [this.data[i], this.data[min]] = [this.data[min], this.data[i]];
        i = min;
      }
    }
    return top;
  }
  get length() { return this.data.length; }
}

function* astarSearch(hType) {
  if (!startPos || !endPos) return;
  const open = new MinHeap();
  const sr = startPos.r, sc = startPos.c;
  const er = endPos.r, ec = endPos.c;
  grid[sr][sc].g = 0;
  grid[sr][sc].f = heuristic(sr, sc, er, ec, hType);
  open.push({ r: sr, c: sc, f: grid[sr][sc].f });

  while (open.length > 0) {
    const cur = open.pop();
    const cell = grid[cur.r][cur.c];
    if (cell.state === VISITED) continue;
    cell.state = VISITED;
    visitedCount++;

    if (cur.r === er && cur.c === ec) { yield 'found'; return; }

    for (const nb of getNeighbors(cur.r, cur.c)) {
      const ncell = grid[nb.r][nb.c];
      const newG = cell.g + nb.cost * ncell.weight;
      if (newG < ncell.g) {
        ncell.g = newG;
        ncell.f = newG + heuristic(nb.r, nb.c, er, ec, hType);
        ncell.parent = { r: cur.r, c: cur.c };
        if (ncell.state !== VISITED) {
          ncell.state = FRONTIER;
          open.push({ r: nb.r, c: nb.c, f: ncell.f });
        }
      }
    }
    yield 'step';
  }
  yield 'not_found';
}

function* dijkstraSearch() {
  yield* astarSearch('none');
}

function* bfsSearch() {
  if (!startPos || !endPos) return;
  const queue = [{ r: startPos.r, c: startPos.c }];
  grid[startPos.r][startPos.c].g = 0;
  grid[startPos.r][startPos.c].state = VISITED;

  while (queue.length > 0) {
    const cur = queue.shift();
    visitedCount++;

    if (cur.r === endPos.r && cur.c === endPos.c) { yield 'found'; return; }

    for (const nb of getNeighbors(cur.r, cur.c)) {
      const ncell = grid[nb.r][nb.c];
      if (ncell.state === 0) {
        ncell.state = FRONTIER;
        ncell.g = grid[cur.r][cur.c].g + nb.cost * ncell.weight;
        ncell.parent = { r: cur.r, c: cur.c };
        queue.push({ r: nb.r, c: nb.c });
        ncell.state = VISITED;
      }
    }
    yield 'step';
  }
  yield 'not_found';
}

function* dfsSearch() {
  if (!startPos || !endPos) return;
  const stack = [{ r: startPos.r, c: startPos.c }];
  grid[startPos.r][startPos.c].g = 0;

  while (stack.length > 0) {
    const cur = stack.pop();
    const cell = grid[cur.r][cur.c];
    if (cell.state === VISITED) continue;
    cell.state = VISITED;
    visitedCount++;

    if (cur.r === endPos.r && cur.c === endPos.c) { yield 'found'; return; }

    for (const nb of getNeighbors(cur.r, cur.c)) {
      const ncell = grid[nb.r][nb.c];
      if (ncell.state !== VISITED) {
        ncell.state = FRONTIER;
        ncell.g = cell.g + nb.cost * ncell.weight;
        ncell.parent = { r: cur.r, c: cur.c };
        stack.push({ r: nb.r, c: nb.c });
      }
    }
    yield 'step';
  }
  yield 'not_found';
}

function* greedySearch() {
  if (!startPos || !endPos) return;
  const open = new MinHeap();
  const er = endPos.r, ec = endPos.c;
  grid[startPos.r][startPos.c].g = 0;
  grid[startPos.r][startPos.c].f = heuristic(startPos.r, startPos.c, er, ec, 'manhattan');
  open.push({ r: startPos.r, c: startPos.c, f: grid[startPos.r][startPos.c].f });

  while (open.length > 0) {
    const cur = open.pop();
    const cell = grid[cur.r][cur.c];
    if (cell.state === VISITED) continue;
    cell.state = VISITED;
    visitedCount++;

    if (cur.r === er && cur.c === ec) { yield 'found'; return; }

    for (const nb of getNeighbors(cur.r, cur.c)) {
      const ncell = grid[nb.r][nb.c];
      if (ncell.state !== VISITED) {
        ncell.f = heuristic(nb.r, nb.c, er, ec, 'manhattan');
        ncell.g = cell.g + nb.cost * ncell.weight;
        ncell.parent = { r: cur.r, c: cur.c };
        ncell.state = FRONTIER;
        open.push({ r: nb.r, c: nb.c, f: ncell.f });
      }
    }
    yield 'step';
  }
  yield 'not_found';
}

function tracePath() {
  if (!endPos) return;
  let cur = grid[endPos.r][endPos.c];
  pathCost = cur.g;
  while (cur.parent) {
    const p = cur.parent;
    if (grid[p.r][p.c].type !== START) grid[p.r][p.c].state = PATH;
    pathLength++;
    cur = grid[p.r][p.c];
  }
}

function startSearch() {
  if (searching) { searching = false; document.getElementById('btnRun').textContent = 'Run'; return; }
  resetSearchState();
  const algo = document.getElementById('selAlgo').value;
  if (algo === 'astar') searchGen = astarSearch('manhattan');
  else if (algo === 'astar_euclid') searchGen = astarSearch('euclidean');
  else if (algo === 'dijkstra') searchGen = dijkstraSearch();
  else if (algo === 'bfs') searchGen = bfsSearch();
  else if (algo === 'dfs') searchGen = dfsSearch();
  else if (algo === 'greedy') searchGen = greedySearch();
  searching = true;
  searchStartTime = performance.now();
  document.getElementById('btnRun').textContent = 'Stop';
}

// ── Maze generation ─────────────────────────────────────────────
function generateMaze(type) {
  clearAll();
  if (type === 'recursive') {
    // Fill with walls, carve passages
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (grid[r][c].type !== START && grid[r][c].type !== END) grid[r][c].type = WALL;

    function carve(r, c) {
      grid[r][c].type = (r === startPos.r && c === startPos.c) ? START : (r === endPos.r && c === endPos.c) ? END : EMPTY;
      const dirs = [[0,2],[2,0],[0,-2],[-2,0]].sort(() => Math.random() - 0.5);
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        if (nr > 0 && nr < ROWS - 1 && nc > 0 && nc < COLS - 1 && grid[nr][nc].type === WALL) {
          const mr = r + dr / 2, mc = c + dc / 2;
          if (grid[mr][mc].type !== START && grid[mr][mc].type !== END) grid[mr][mc].type = EMPTY;
          carve(nr, nc);
        }
      }
    }
    const sr = startPos.r % 2 === 0 ? startPos.r + 1 : startPos.r;
    const sc = startPos.c % 2 === 0 ? startPos.c + 1 : startPos.c;
    carve(sr, sc);
  } else if (type === 'random30' || type === 'random50') {
    const pct = type === 'random30' ? 0.3 : 0.5;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (grid[r][c].type === EMPTY && Math.random() < pct) grid[r][c].type = WALL;
  } else if (type === 'spiral') {
    let r = 1, c = 1, dr = 0, dc = 1, len = COLS - 3, turns = 0;
    while (len > 1) {
      for (let i = 0; i < len; i++) {
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && grid[r][c].type === EMPTY)
          grid[r][c].type = WALL;
        r += dr; c += dc;
      }
      turns++;
      if (turns % 2 === 1) len -= 2;
      // Turn right
      [dr, dc] = [dc, -dr];
    }
  } else if (type === 'rooms') {
    for (let i = 0; i < 8; i++) {
      const rr = 3 + Math.floor(Math.random() * (ROWS / 3));
      const rc = 3 + Math.floor(Math.random() * (COLS / 3));
      const ry = Math.floor(Math.random() * (ROWS - rr - 2)) + 1;
      const rx = Math.floor(Math.random() * (COLS - rc - 2)) + 1;
      for (let r = ry; r < ry + rr; r++)
        for (let c = rx; c < rx + rc; c++)
          if (r === ry || r === ry + rr - 1 || c === rx || c === rx + rc - 1)
            if (grid[r][c].type === EMPTY) grid[r][c].type = WALL;
      // Door
      const side = Math.floor(Math.random() * 4);
      let dr, dc2;
      if (side === 0) { dr = ry; dc2 = rx + 1 + Math.floor(Math.random() * (rc - 2)); }
      else if (side === 1) { dr = ry + rr - 1; dc2 = rx + 1 + Math.floor(Math.random() * (rc - 2)); }
      else if (side === 2) { dc2 = rx; dr = ry + 1 + Math.floor(Math.random() * (rr - 2)); }
      else { dc2 = rx + rc - 1; dr = ry + 1 + Math.floor(Math.random() * (rr - 2)); }
      if (dr >= 0 && dr < ROWS && dc2 >= 0 && dc2 < COLS) grid[dr][dc2].type = EMPTY;
    }
  }
}

// ── Render ──────────────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      const x = c * CELL, y = r * CELL;

      let color = null;
      if (cell.type === WALL) color = '#1a1a30';
      else if (cell.type === START) color = '#2060a0';
      else if (cell.type === END) color = '#a02040';
      else if (cell.type === WEIGHT) color = '#2a2a10';
      else if (cell.state === PATH) color = '#c0a030';
      else if (cell.state === VISITED) color = '#0e1a2a';
      else if (cell.state === FRONTIER) color = '#102830';

      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, CELL - 1, CELL - 1);
      }

      // Weight indicator
      if (cell.type === WEIGHT) {
        ctx.fillStyle = '#605020';
        ctx.font = '8px "Courier New",monospace';
        ctx.textAlign = 'center';
        ctx.fillText('5', x + CELL / 2, y + CELL / 2 + 3);
        ctx.textAlign = 'left';
      }

      // Start/End labels
      if (cell.type === START) {
        ctx.fillStyle = '#80c0ff';
        ctx.font = 'bold 10px "Courier New",monospace';
        ctx.textAlign = 'center';
        ctx.fillText('S', x + CELL / 2, y + CELL / 2 + 4);
        ctx.textAlign = 'left';
      }
      if (cell.type === END) {
        ctx.fillStyle = '#ff8090';
        ctx.font = 'bold 10px "Courier New",monospace';
        ctx.textAlign = 'center';
        ctx.fillText('E', x + CELL / 2, y + CELL / 2 + 4);
        ctx.textAlign = 'left';
      }
    }
  }

  // Grid lines
  ctx.strokeStyle = '#0a0a16';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c * CELL - 0.5, 0); ctx.lineTo(c * CELL - 0.5, ROWS * CELL); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * CELL - 0.5); ctx.lineTo(COLS * CELL, r * CELL - 0.5); ctx.stroke(); }

  // Stats
  document.getElementById('statVisited').textContent = visitedCount;
  document.getElementById('statPath').textContent = pathLength;
  document.getElementById('statCost').textContent = pathCost === 0 ? '—' : pathCost.toFixed(1);
  document.getElementById('statGrid').textContent = `${COLS}x${ROWS}`;
}

// ── Input ───────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  const rect = canvas.getBoundingClientRect();
  const pos = cellAt(e.clientX - rect.left, e.clientY - rect.top);
  if (pos) applyTool(pos.r, pos.c);
});

canvas.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const rect = canvas.getBoundingClientRect();
  const pos = cellAt(e.clientX - rect.left, e.clientY - rect.top);
  if (pos && (tool === 'wall' || tool === 'eraser' || tool === 'weight')) applyTool(pos.r, pos.c);
});

canvas.addEventListener('mouseup', () => { mouseDown = false; });

document.getElementById('rSpeed').addEventListener('input', function() {
  document.getElementById('speedVal').textContent = this.value;
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'w') setTool('wall');
  if (e.key === 's') setTool('start');
  if (e.key === 'e') setTool('end');
  if (e.key === 'g') setTool('weight');
  if (e.key === 'r') setTool('eraser');
  if (e.key === ' ') { e.preventDefault(); startSearch(); }
  if (e.key === 'c') clearAll();
});

// ── Loop ────────────────────────────────────────────────────────
function loop() {
  if (searching && searchGen && !searchDone) {
    for (let i = 0; i < stepsPerFrame; i++) {
      const result = searchGen.next();
      if (result.done || result.value === 'found' || result.value === 'not_found') {
        searching = false;
        searchDone = true;
        document.getElementById('btnRun').textContent = 'Run';
        const elapsed = performance.now() - searchStartTime;
        document.getElementById('statTime').textContent = elapsed.toFixed(1) + 'ms';
        if (result.value === 'found') tracePath();
        break;
      }
    }
  }
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
