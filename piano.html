<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synth</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #070709;
    color: #c8c8c8;
    font-family: 'Courier New', monospace;
    display: flex; flex-direction: column; align-items: center;
    height: 100vh; overflow: hidden; user-select: none;
  }
  h1 { font-size: 0.9rem; letter-spacing: 0.25em; color: #444; text-transform: uppercase; padding: 8px 0 4px; }

  #controls {
    display: flex; gap: 7px; flex-wrap: wrap; justify-content: center;
    padding: 3px 0 6px; align-items: center;
  }
  button {
    background: #111116; color: #888; border: 1px solid #1e1e28;
    padding: 3px 10px; cursor: pointer; font-family: inherit;
    font-size: 0.7rem; border-radius: 3px; transition: all 0.12s;
  }
  button:hover { background: #18181e; color: #ccc; }
  button.active { background: #1a1a32; color: #a0a0ff; border-color: #3030aa; }
  label { font-size: 0.7rem; color: #444; display: flex; align-items: center; gap: 5px; }
  input[type=range] { width: 60px; accent-color: #5050cc; }
  select { background: #111116; color: #888; border: 1px solid #1e1e28; padding: 3px 7px; font-family: inherit; font-size: 0.7rem; border-radius: 3px; }

  #vis { display: block; width: 100%; max-width: 900px; height: 54px; }

  #chord-display {
    font-size: 0.8rem; letter-spacing: 0.12em; color: #5050cc;
    height: 22px; padding: 2px 0 2px;
    text-transform: uppercase;
  }
  #notes-held { font-size: 0.65rem; color: #333; height: 16px; }

  /* ── Keyboard ── */
  #keyboard-wrap {
    position: relative;
    flex: 1;
    display: flex; align-items: flex-end; justify-content: center;
    width: 100%; padding-bottom: 8px; overflow: hidden;
  }
  #keyboard { position: relative; display: flex; }

  .white-key {
    background: linear-gradient(to bottom, #1a1a22, #2a2a36);
    border: 1px solid #111;
    border-radius: 0 0 4px 4px;
    cursor: pointer;
    position: relative;
    transition: background 0.04s;
    flex-shrink: 0;
  }
  .white-key:active, .white-key.pressed {
    background: linear-gradient(to bottom, #3a3a6a, #5050a0) !important;
  }
  .white-key .key-label {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    font-size: 0.55rem; color: #444; letter-spacing: 0;
  }
  .white-key.pressed .key-label { color: #a0a0ff; }

  .black-key {
    background: linear-gradient(to bottom, #080810, #111118);
    border: 1px solid #000;
    border-radius: 0 0 3px 3px;
    cursor: pointer;
    position: absolute;
    z-index: 2;
    transition: background 0.04s;
  }
  .black-key:active, .black-key.pressed {
    background: linear-gradient(to bottom, #2a2a50, #4040a0) !important;
  }

  #octave-bar {
    position: absolute; top: 0; left: 0; right: 0;
    font-size: 0.55rem; color: #222; pointer-events: none;
    display: flex;
  }
</style>
</head>
<body>
<h1>Synthesizer</h1>
<div id="controls">
  <label>Voice
    <select id="voice">
      <option value="piano">Piano</option>
      <option value="organ">Organ</option>
      <option value="lead">Lead</option>
      <option value="pad">Pad</option>
      <option value="bass">Bass</option>
      <option value="bell">Bell</option>
      <option value="pluck">Pluck</option>
    </select>
  </label>
  <label>Oct <input type="range" id="octave" min="1" max="6" value="4"><span id="octVal">4</span></label>
  <label>Vol <input type="range" id="vol"    min="0" max="1" step="0.05" value="0.65"></label>
  <label>Rev <input type="range" id="rev"    min="0" max="1" step="0.05" value="0.25"></label>
  <label>Dly <input type="range" id="dly"    min="0" max="1" step="0.05" value="0.0"></label>
  <button id="btnSustain">Sustain [SPC]</button>
  <button id="btnRecord">Record</button>
  <button id="btnPlay"   disabled>Play Back</button>
</div>
<canvas id="vis"></canvas>
<div id="chord-display">&nbsp;</div>
<div id="notes-held">&nbsp;</div>
<div id="keyboard-wrap"><div id="keyboard"></div></div>

<script>
// ── Audio context ─────────────────────────────────────────────────
let audioCtx, masterGain, reverbGain, reverbNode, delayNode, delayGain, analyser;
let reverbBuf = null;
const activeNotes = new Map(); // midi → {osc, gain, ...}
let sustained = false;
let sustainedNotes = new Set();
let recording = false, recordStart = 0, recordEvents = [];
let recordedSong = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('vol').value);

  // Reverb
  reverbNode = audioCtx.createConvolver();
  makeImpulse(2.5);
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = parseFloat(document.getElementById('rev').value);
  masterGain.connect(reverbNode);
  reverbNode.connect(reverbGain);
  reverbGain.connect(analyser);

  // Delay
  delayNode = audioCtx.createDelay(1.0);
  delayNode.delayTime.value = 0.35;
  delayGain = audioCtx.createGain();
  delayGain.gain.value = parseFloat(document.getElementById('dly').value);
  masterGain.connect(delayNode);
  delayNode.connect(delayGain);
  delayGain.connect(analyser);

  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function makeImpulse(dur) {
  if (!audioCtx) return;
  const sr = audioCtx.sampleRate;
  const len = sr * dur;
  const buf = audioCtx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.5);
  }
  reverbBuf = buf;
  if (reverbNode) reverbNode.buffer = buf;
}

function midiToFreq(m) { return 440 * Math.pow(2, (m-69)/12); }

// ── Voices ────────────────────────────────────────────────────────
const VOICES = {
  piano: {
    buildOsc(freq, dest) {
      const o1 = audioCtx.createOscillator(); o1.type='triangle'; o1.frequency.value=freq;
      const o2 = audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2;
      const g1 = audioCtx.createGain(); g1.gain.value=0.7;
      const g2 = audioCtx.createGain(); g2.gain.value=0.2;
      o1.connect(g1); o2.connect(g2); g1.connect(dest); g2.connect(dest);
      return {oscs:[o1,o2], start(t){o1.start(t);o2.start(t);}, stop(t){o1.stop(t);o2.stop(t);}};
    },
    attack:0.008, decay:0.4, sustain:0.3, release:0.8,
  },
  organ: {
    buildOsc(freq, dest) {
      const oscs = [1,2,3,4].map((h,i) => {
        const o = audioCtx.createOscillator(); o.type='sine'; o.frequency.value=freq*h;
        const g = audioCtx.createGain(); g.gain.value=[0.7,0.5,0.3,0.2][i];
        o.connect(g); g.connect(dest); return o;
      });
      return {oscs, start(t){oscs.forEach(o=>o.start(t));}, stop(t){oscs.forEach(o=>o.stop(t));}};
    },
    attack:0.015, decay:0, sustain:1.0, release:0.1,
  },
  lead: {
    buildOsc(freq, dest) {
      const o = audioCtx.createOscillator(); o.type='sawtooth'; o.frequency.value=freq;
      const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq*4; f.Q.value=2;
      o.connect(f); f.connect(dest);
      return {oscs:[o], start(t){o.start(t);}, stop(t){o.stop(t);}};
    },
    attack:0.01, decay:0.1, sustain:0.8, release:0.2,
  },
  pad: {
    buildOsc(freq, dest) {
      const oscs = [0, 0.05, -0.05].map(det => {
        const o = audioCtx.createOscillator(); o.type='sawtooth'; o.frequency.value=freq*(1+det/100);
        const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800; f.Q.value=0.5;
        o.connect(f); f.connect(dest); return o;
      });
      return {oscs, start(t){oscs.forEach(o=>o.start(t));}, stop(t){oscs.forEach(o=>o.stop(t));}};
    },
    attack:0.3, decay:0.1, sustain:0.9, release:0.8,
  },
  bass: {
    buildOsc(freq, dest) {
      const o1 = audioCtx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=freq/2;
      const o2 = audioCtx.createOscillator(); o2.type='square';   o2.frequency.value=freq/2;
      const f  = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=400;
      const g  = audioCtx.createGain(); g.gain.value=0.5;
      o1.connect(f); o2.connect(g); f.connect(dest); g.connect(dest);
      return {oscs:[o1,o2], start(t){o1.start(t);o2.start(t);}, stop(t){o1.stop(t);o2.stop(t);}};
    },
    attack:0.01, decay:0.3, sustain:0.6, release:0.3,
  },
  bell: {
    buildOsc(freq, dest) {
      const ratios=[1,2.756,5.404,8.933];
      const oscs = ratios.map((r,i)=>{
        const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=freq*r;
        const g=audioCtx.createGain(); g.gain.value=[0.6,0.4,0.25,0.15][i];
        o.connect(g); g.connect(dest); return o;
      });
      return {oscs, start(t){oscs.forEach(o=>o.start(t));}, stop(t){oscs.forEach(o=>o.stop(t));}};
    },
    attack:0.001, decay:1.5, sustain:0.0, release:0.5,
  },
  pluck: {
    buildOsc(freq, dest) {
      // Karplus-Strong-ish: noise → lowpass, fast decay
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.05, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const src = audioCtx.createBufferSource(); src.buffer=buf;
      const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq*3;
      src.connect(f); f.connect(dest);
      return {oscs:[], start(t){src.start(t);}, stop(){}};
    },
    attack:0.001, decay:0.3, sustain:0.0, release:0.1,
  },
};

// ── Note on/off ───────────────────────────────────────────────────
function noteOn(midi, velocity=0.8) {
  initAudio();
  if (activeNotes.has(midi)) return;
  const freq = midiToFreq(midi);
  const v = VOICES[document.getElementById('voice').value];
  const now = audioCtx.currentTime;

  const envGain = audioCtx.createGain();
  envGain.gain.setValueAtTime(0, now);
  envGain.gain.linearRampToValueAtTime(velocity * masterGain.gain.value, now + v.attack);
  envGain.gain.linearRampToValueAtTime(v.sustain * velocity * masterGain.gain.value, now + v.attack + v.decay);
  envGain.connect(masterGain);

  const osc = v.buildOsc(freq, envGain);
  osc.start(now);

  activeNotes.set(midi, {osc, envGain, v});
  if (recording) recordEvents.push({type:'on', midi, t: audioCtx.currentTime - recordStart});
  updateHeld();
}

function noteOff(midi) {
  if (!activeNotes.has(midi)) return;
  if (sustained) { sustainedNotes.add(midi); return; }
  releaseNote(midi);
}

function releaseNote(midi) {
  const note = activeNotes.get(midi);
  if (!note) return;
  const now = audioCtx.currentTime;
  const {envGain, osc, v} = note;
  envGain.gain.cancelScheduledValues(now);
  envGain.gain.setValueAtTime(envGain.gain.value, now);
  envGain.gain.exponentialRampToValueAtTime(0.0001, now + v.release);
  setTimeout(() => { try { osc.stop(now + v.release + 0.05); } catch(e){} }, (v.release+0.1)*1000);
  activeNotes.delete(midi);
  sustainedNotes.delete(midi);
  if (recording) recordEvents.push({type:'off', midi, t: audioCtx.currentTime - recordStart});
  updateHeld();
}

// ── Chord detection ───────────────────────────────────────────────
const CHORD_PATTERNS = [
  [[0,4,7],    'maj'],  [[0,3,7],    'min'],  [[0,4,7,11],'maj7'],
  [[0,3,7,10], 'min7'], [[0,4,7,10], '7'],    [[0,3,6],   'dim'],
  [[0,4,8],    'aug'],  [[0,5,7],    'sus4'],  [[0,2,7],   'sus2'],
  [[0,3,6,10], 'ø7'],   [[0,4,7,11,14],'maj9'],[[0,3,7,10,14],'min9'],
];
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function detectChord() {
  const held = [...activeNotes.keys(), ...sustainedNotes];
  if (held.length < 2) return held.length===1 ? NOTE_NAMES[held[0]%12] : '';
  const classes = [...new Set(held.map(m=>m%12))].sort((a,b)=>a-b);
  for (const root of classes) {
    const intervals = classes.map(c=>((c-root)+12)%12).sort((a,b)=>a-b);
    for (const [pattern, name] of CHORD_PATTERNS) {
      if (pattern.every((v,i)=>intervals[i]===v) && intervals.length===pattern.length) {
        return NOTE_NAMES[root] + name;
      }
    }
  }
  return classes.map(c=>NOTE_NAMES[c]).join('-');
}

function updateHeld() {
  const chord = detectChord();
  document.getElementById('chord-display').textContent = chord || '\u00a0';
  const names = [...activeNotes.keys()].map(m=>`${NOTE_NAMES[m%12]}${Math.floor(m/12)-1}`);
  document.getElementById('notes-held').textContent = names.join('  ') || '\u00a0';
  // Light up keys
  document.querySelectorAll('.white-key,.black-key').forEach(k=>{
    k.classList.toggle('pressed', activeNotes.has(parseInt(k.dataset.midi)));
  });
}

// ── Build keyboard ────────────────────────────────────────────────
const WHITE_SEMIS = [0,2,4,5,7,9,11]; // C D E F G A B
const BLACK_OFFSETS = {1:0.6, 3:1.6, 6:3.6, 8:4.6, 10:5.6}; // semitone→x offset in white keys

function buildKeyboard() {
  const kb   = document.getElementById('keyboard');
  kb.innerHTML = '';
  const octBase = parseInt(document.getElementById('octave').value);
  const OCTAVES = 3;
  const keyW  = Math.min(48, Math.floor((window.innerWidth - 20) / (OCTAVES * 7)));
  const keyH  = Math.min(160, Math.floor((window.innerHeight - 240)));
  const blackW = keyW * 0.62 | 0;
  const blackH = keyH * 0.6  | 0;

  kb.style.width  = (keyW * 7 * OCTAVES) + 'px';
  kb.style.height = keyH + 'px';
  kb.style.position = 'relative';

  for (let oct = 0; oct < OCTAVES; oct++) {
    const base = (octBase + oct) * 12;
    // White keys
    WHITE_SEMIS.forEach((semi, wi) => {
      const midi = base + semi;
      const key  = document.createElement('div');
      key.className = 'white-key';
      key.dataset.midi = midi;
      key.style.cssText = `width:${keyW}px;height:${keyH}px;left:${(oct*7+wi)*keyW}px;top:0;position:absolute;`;
      const lbl = document.createElement('div');
      lbl.className = 'key-label';
      lbl.textContent = KB_MAP_LABELS[midi] || '';
      key.appendChild(lbl);
      key.addEventListener('mousedown', e=>{e.preventDefault();noteOn(midi);});
      key.addEventListener('mouseup',   ()=>noteOff(midi));
      key.addEventListener('mouseleave',()=>{ if(activeNotes.has(midi)) noteOff(midi); });
      kb.appendChild(key);
    });
    // Black keys
    Object.entries(BLACK_OFFSETS).forEach(([semiStr, xOff]) => {
      const semi = parseInt(semiStr);
      const midi = base + semi;
      const key  = document.createElement('div');
      key.className = 'black-key';
      key.dataset.midi = midi;
      key.style.cssText = `width:${blackW}px;height:${blackH}px;left:${((oct*7+xOff)*keyW - blackW/2)|0}px;top:0;`;
      key.addEventListener('mousedown', e=>{e.preventDefault();noteOn(midi);});
      key.addEventListener('mouseup',   ()=>noteOff(midi));
      key.addEventListener('mouseleave',()=>{ if(activeNotes.has(midi)) noteOff(midi); });
      kb.appendChild(key);
    });
  }
}

// ── Computer keyboard mapping ─────────────────────────────────────
// Two rows: bottom=white, top=black (roughly)
const KB_MAP_LABELS = {};
function buildKBMap() {
  const octBase = parseInt(document.getElementById('octave').value);
  // Row 1 (lower): a s d f g h j k l ; → C D E F G A B C D E
  const lower = 'asdfghjkl;'.split('');
  const lower_semi = [0,2,4,5,7,9,11,12,14,16];
  // Row 2 (upper): w e t y u o p → C# D# F# G# A# (and octave+1)
  const upper = 'wetyu op'.replace(/ /g,'').split('');
  const upper_semi = [1,3,6,8,10,13,15];

  const map = {};
  lower.forEach((k,i)=>{ map[k]=(octBase*12)+lower_semi[i]; });
  upper.forEach((k,i)=>{ map[k]=(octBase*12)+upper_semi[i]; });

  // Label keys
  Object.entries(map).forEach(([k,m])=>{ KB_MAP_LABELS[m]=k.toUpperCase(); });
  return map;
}

let kbMap = {};
const keysHeld = new Set();

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.code === 'Space') {
    e.preventDefault();
    setSustain(true); return;
  }
  const midi = kbMap[e.key.toLowerCase()];
  if (midi !== undefined && !keysHeld.has(e.key)) {
    keysHeld.add(e.key);
    noteOn(midi);
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { setSustain(false); return; }
  const midi = kbMap[e.key.toLowerCase()];
  if (midi !== undefined) { keysHeld.delete(e.key); noteOff(midi); }
});

// ── Sustain ───────────────────────────────────────────────────────
function setSustain(on) {
  sustained = on;
  document.getElementById('btnSustain').classList.toggle('active', on);
  if (!on) {
    sustainedNotes.forEach(m => releaseNote(m));
    sustainedNotes.clear();
  }
}
document.getElementById('btnSustain').addEventListener('click', ()=>setSustain(!sustained));

// ── Record / playback ─────────────────────────────────────────────
document.getElementById('btnRecord').addEventListener('click', () => {
  initAudio();
  recording = !recording;
  document.getElementById('btnRecord').classList.toggle('active', recording);
  document.getElementById('btnRecord').textContent = recording ? '● Recording' : 'Record';
  if (recording) {
    recordEvents = []; recordStart = audioCtx.currentTime;
    document.getElementById('btnPlay').disabled = true;
  } else {
    recordedSong = [...recordEvents];
    document.getElementById('btnPlay').disabled = recordedSong.length === 0;
  }
});

document.getElementById('btnPlay').addEventListener('click', () => {
  if (!recordedSong) return;
  initAudio();
  activeNotes.forEach((_,m) => releaseNote(m));
  recordedSong.forEach(ev => {
    setTimeout(() => {
      if (ev.type==='on') noteOn(ev.midi);
      else noteOff(ev.midi);
    }, ev.t * 1000);
  });
});

// ── Controls ──────────────────────────────────────────────────────
document.getElementById('vol').addEventListener('input', e => {
  if (masterGain) masterGain.gain.value = parseFloat(e.target.value);
});
document.getElementById('rev').addEventListener('input', e => {
  if (reverbGain) reverbGain.gain.value = parseFloat(e.target.value);
});
document.getElementById('dly').addEventListener('input', e => {
  if (delayGain) delayGain.gain.value = parseFloat(e.target.value);
});
document.getElementById('octave').addEventListener('input', e => {
  document.getElementById('octVal').textContent = e.target.value;
  activeNotes.forEach((_,m)=>releaseNote(m));
  kbMap = buildKBMap();
  buildKeyboard();
});

// ── Visualizer ────────────────────────────────────────────────────
const vis = document.getElementById('vis');
const vCtx = vis.getContext('2d');

function drawVis() {
  requestAnimationFrame(drawVis);
  const W = vis.offsetWidth, H = vis.offsetHeight;
  if (vis.width !== W) vis.width = W;
  if (vis.height !== H) vis.height = H;
  vCtx.fillStyle = '#070709'; vCtx.fillRect(0,0,W,H);
  if (!analyser) return;
  const buf = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  vCtx.strokeStyle = '#4040a0'; vCtx.lineWidth = 1.5;
  vCtx.beginPath();
  for (let i=0;i<buf.length;i++) {
    const x=i/buf.length*W, y=(buf[i]/128-1)*(H/2)+H/2;
    i===0?vCtx.moveTo(x,y):vCtx.lineTo(x,y);
  }
  vCtx.stroke();
  // Highlight active notes
  activeNotes.forEach((_,midi)=>{
    const freq=midiToFreq(midi);
    const x=(Math.log2(freq/20)/Math.log2(20000/20))*W;
    vCtx.fillStyle='rgba(100,100,255,0.3)';
    vCtx.fillRect(x-1,0,3,H);
  });
}
requestAnimationFrame(drawVis);

// ── Init ──────────────────────────────────────────────────────────
kbMap = buildKBMap();
buildKeyboard();
window.addEventListener('resize', buildKeyboard);
</script>
</body>
</html>
