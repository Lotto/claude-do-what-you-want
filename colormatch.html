<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Match</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #a0a0b8; font: 12px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #top { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #0a0a14; border-bottom: 1px solid #141428; flex-shrink: 0; flex-wrap: wrap; }
  h1 { font-size: 11px; color: #808098; letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; }
  .sep { width: 1px; height: 18px; background: #1a1a30; margin: 0 2px; }
  button { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; border-radius: 3px; }
  button:hover { background: #14142a; color: #9090c0; }
  button.active { background: #1a2a50; color: #80b0ff; border-color: #3060a0; }
  select { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; font: 11px 'Courier New', monospace; padding: 2px 6px; border-radius: 3px; }

  #main { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 16px; }

  #board { display: grid; gap: 8px; }

  .card { position: relative; aspect-ratio: 1; border-radius: 6px; cursor: pointer; perspective: 600px; min-width: 60px; }
  .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.4s ease; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }
  .card.matched { cursor: default; }

  .card-face { position: absolute; width: 100%; height: 100%; border-radius: 6px; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .card-front { background: #12122a; border: 2px solid #1e1e3a; }
  .card-front:hover { border-color: #3040a0; }
  .card-front .q-mark { font-size: 24px; color: #2a2a50; }
  .card-back { transform: rotateY(180deg); border: 2px solid transparent; }
  .card-back .hex-label { font-size: 10px; color: rgba(0,0,0,0.6); font-weight: bold; text-shadow: 0 0 4px rgba(255,255,255,0.3); margin-top: 4px; }
  .card.matched .card-back { border-color: #30a060; box-shadow: 0 0 12px rgba(48,160,96,0.3); }
  .card.wrong .card-inner { animation: shake 0.4s ease; }

  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
  }

  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  #overlay.show { display: flex; }
  #winBox { background: #0c0c1a; border: 1px solid #2a2a50; border-radius: 8px; padding: 32px 48px; text-align: center; }
  #winBox h2 { font-size: 18px; color: #80b0ff; font-weight: normal; margin-bottom: 12px; }
  #winBox .stats { color: #606080; margin-bottom: 16px; line-height: 1.8; }
  #winBox button { font-size: 13px; padding: 6px 20px; }

  #statusBar { padding: 4px 12px; background: #06060c; border-top: 1px solid #101020; font-size: 10px; color: #303050; display: flex; gap: 16px; flex-shrink: 0; }
  .stat b { color: #505078; font-weight: normal; }
</style>
</head>
<body>

<div id="top">
  <h1>Color Match</h1>
  <div class="sep"></div>
  <select id="selSize" onchange="startGame(+this.value)">
    <option value="8">4x4 (Easy)</option>
    <option value="12">4x6 (Medium)</option>
    <option value="18" selected>6x6 (Hard)</option>
    <option value="32">8x8 (Expert)</option>
  </select>
  <div class="sep"></div>
  <select id="selMode" onchange="gameMode=this.value;startGame(pairCount)">
    <option value="color">Match Colors</option>
    <option value="hex">Match Hex Codes</option>
    <option value="complement">Match Complements</option>
  </select>
  <div class="sep"></div>
  <button onclick="startGame(pairCount)">New Game (R)</button>
  <div class="sep"></div>
  <span style="color:#404060">Moves: <b id="statMoves" style="color:#6080c0">0</b></span>
  <span style="color:#404060;margin-left:8px">Pairs: <b id="statPairs" style="color:#6080c0">0</b>/<b id="statTotal" style="color:#505070">0</b></span>
  <span style="color:#404060;margin-left:8px">Time: <b id="statTime" style="color:#6080c0">0:00</b></span>
  <span style="color:#404060;margin-left:8px">Best: <b id="statBest" style="color:#50a070">—</b></span>
</div>

<div id="main">
  <div id="board"></div>
</div>

<div id="overlay">
  <div id="winBox">
    <h2>All Matched!</h2>
    <div class="stats" id="winStats"></div>
    <button onclick="document.getElementById('overlay').classList.remove('show');startGame(pairCount)">Play Again</button>
  </div>
</div>

<div id="statusBar">
  <span class="stat">Flip two cards to find matching color pairs | Memorize hex codes and positions</span>
</div>

<script>
'use strict';

let pairCount = 18;
let gameMode = 'color';
let cards = [];
let flipped = [];
let matched = new Set();
let moves = 0;
let pairs = 0;
let locked = false;
let startTime = 0;
let timerInterval = null;
let bestTimes = {};

function generateColors(n) {
  const colors = [];
  // Generate visually distinct colors
  const hueStep = 360 / n;
  for (let i = 0; i < n; i++) {
    const hue = (i * hueStep + Math.random() * hueStep * 0.4) % 360;
    const sat = 50 + Math.random() * 30;
    const lit = 40 + Math.random() * 25;
    colors.push(hslToHex(hue, sat, lit));
  }
  return colors;
}

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return '#' + f(0) + f(8) + f(4);
}

function complementColor(hex) {
  const r = 255 - parseInt(hex.slice(1, 3), 16);
  const g = 255 - parseInt(hex.slice(3, 5), 16);
  const b = 255 - parseInt(hex.slice(5, 7), 16);
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame(n) {
  pairCount = n;
  const totalCards = n * 2;
  const colors = generateColors(n);

  cards = [];
  for (let i = 0; i < n; i++) {
    if (gameMode === 'complement') {
      cards.push({ id: i, color: colors[i], pairId: i, showHex: false });
      cards.push({ id: i, color: complementColor(colors[i]), pairId: i, showHex: false });
    } else {
      cards.push({ id: i, color: colors[i], pairId: i, showHex: gameMode === 'hex' });
      cards.push({ id: i, color: colors[i], pairId: i, showHex: gameMode === 'hex' });
    }
  }
  shuffle(cards);

  flipped = [];
  matched = new Set();
  moves = 0;
  pairs = 0;
  locked = false;

  // Grid dimensions
  let gridCols;
  if (totalCards <= 8) gridCols = 4;
  else if (totalCards <= 12) gridCols = 4;
  else if (totalCards <= 18) gridCols = 6;
  else if (totalCards <= 24) gridCols = 6;
  else gridCols = 8;

  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${gridCols}, minmax(60px, 90px))`;
  board.innerHTML = '';

  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = idx;

    const inner = document.createElement('div');
    inner.className = 'card-inner';

    const front = document.createElement('div');
    front.className = 'card-face card-front';
    front.innerHTML = '<span class="q-mark">?</span>';

    const back = document.createElement('div');
    back.className = 'card-face card-back';
    back.style.background = card.color;
    if (card.showHex || gameMode === 'complement') {
      back.innerHTML = `<span class="hex-label">${card.color.toUpperCase()}</span>`;
    }

    inner.appendChild(front);
    inner.appendChild(back);
    el.appendChild(inner);

    el.addEventListener('click', () => flipCard(idx, el));
    board.appendChild(el);
  });

  updateStats();
  startTimer();
}

function flipCard(idx, el) {
  if (locked) return;
  if (matched.has(cards[idx].pairId)) return;
  if (flipped.length >= 2) return;
  if (flipped.some(f => f.idx === idx)) return;

  el.classList.add('flipped');
  flipped.push({ idx, el });

  if (flipped.length === 2) {
    moves++;
    locked = true;
    const [a, b] = flipped;
    const cardA = cards[a.idx];
    const cardB = cards[b.idx];

    if (cardA.pairId === cardB.pairId && a.idx !== b.idx) {
      // Match!
      matched.add(cardA.pairId);
      pairs++;
      setTimeout(() => {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        flipped = [];
        locked = false;
        updateStats();
        if (pairs === pairCount) gameWon();
      }, 400);
    } else {
      // No match
      setTimeout(() => {
        a.el.classList.add('wrong');
        b.el.classList.add('wrong');
        setTimeout(() => {
          a.el.classList.remove('flipped', 'wrong');
          b.el.classList.remove('flipped', 'wrong');
          flipped = [];
          locked = false;
        }, 600);
      }, 700);
    }
    updateStats();
  }
}

function gameWon() {
  clearInterval(timerInterval);
  const elapsed = ((Date.now() - startTime) / 1000) | 0;
  const key = `${pairCount}-${gameMode}`;
  if (!bestTimes[key] || elapsed < bestTimes[key]) {
    bestTimes[key] = elapsed;
  }

  const mins = (elapsed / 60) | 0;
  const secs = elapsed % 60;
  const timeStr = `${mins}:${String(secs).padStart(2, '0')}`;

  document.getElementById('winStats').innerHTML = `
    Moves: ${moves}<br>
    Time: ${timeStr}<br>
    Efficiency: ${Math.round(pairCount / moves * 100)}%
  `;
  document.getElementById('overlay').classList.add('show');
  updateBest();
}

function startTimer() {
  clearInterval(timerInterval);
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = ((Date.now() - startTime) / 1000) | 0;
    const mins = (elapsed / 60) | 0;
    const secs = elapsed % 60;
    document.getElementById('statTime').textContent = `${mins}:${String(secs).padStart(2, '0')}`;
  }, 200);
}

function updateStats() {
  document.getElementById('statMoves').textContent = moves;
  document.getElementById('statPairs').textContent = pairs;
  document.getElementById('statTotal').textContent = pairCount;
  updateBest();
}

function updateBest() {
  const key = `${pairCount}-${gameMode}`;
  const b = bestTimes[key];
  if (b) {
    const mins = (b / 60) | 0;
    const secs = b % 60;
    document.getElementById('statBest').textContent = `${mins}:${String(secs).padStart(2, '0')}`;
  } else {
    document.getElementById('statBest').textContent = '—';
  }
}

// ── Keyboard ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'r') startGame(pairCount);
});

// Start
startGame(pairCount);
</script>
</body>
</html>
