<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  h1 { font-size: 1rem; letter-spacing: 0.2em; padding: 10px 0 6px; color: #888; text-transform: uppercase; }
  #controls { display: flex; gap: 8px; padding: 6px 0 8px; flex-wrap: wrap; justify-content: center; }
  button {
    background: #1e1e1e; color: #ccc; border: 1px solid #333;
    padding: 4px 12px; cursor: pointer; font-family: inherit;
    font-size: 0.75rem; border-radius: 3px; transition: background 0.15s;
  }
  button:hover { background: #2a2a2a; color: #fff; }
  label { font-size: 0.75rem; color: #888; display: flex; align-items: center; gap: 6px; }
  input[type=range] { width: 70px; accent-color: #4a7a9a; }
  #info { font-size: 0.7rem; color: #555; padding-bottom: 4px; }
  canvas { border: 1px solid #222; display: block; }
</style>
</head>
<body>
<h1>Maze Generator</h1>
<div id="controls">
  <button id="btnNew">New Maze</button>
  <button id="btnSolve">Solve</button>
  <button id="btnSkip">Skip Anim</button>
  <label>Size <input type="range" id="sizeSlider" min="5" max="60" value="25"></label>
  <label>Speed <input type="range" id="speedSlider" min="1" max="100" value="30"></label>
</div>
<div id="info" id="info">Use arrow keys or WASD to move &nbsp;|&nbsp; <span id="status">Generating...</span></div>
<canvas id="c" tabindex="0"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.focus();

const N = 1, S = 2, E = 4, W = 8;
const OPPOSITE = { [N]: S, [S]: N, [E]: W, [W]: E };
const DX = { [N]: 0, [S]: 0, [E]: 1, [W]: -1 };
const DY = { [N]: -1, [S]: 1, [E]: 0, [W]: 0 };

let COLS, ROWS, CELL;
let cells; // bitmask of open walls
let stack, visited;
let generating, solving, done;
let playerX, playerY;
let path; // BFS solution path
let solutionShown = false;

function resize() {
  const maxW = Math.min(window.innerWidth - 20, 1100);
  const maxH = window.innerHeight - 130;
  COLS = parseInt(document.getElementById('sizeSlider').value);
  ROWS = Math.round(COLS * (maxH / maxW));
  CELL = Math.min(Math.floor(maxW / COLS), Math.floor(maxH / ROWS));
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
}

function newMaze() {
  resize();
  cells = new Uint8Array(COLS * ROWS);
  visited = new Uint8Array(COLS * ROWS);
  generating = true;
  solving = false;
  done = false;
  solutionShown = false;
  path = null;
  playerX = 0;
  playerY = 0;

  // Start DFS from (0,0)
  stack = [[0, 0]];
  visited[0] = 1;
  document.getElementById('status').textContent = 'Generating...';
}

function idx(x, y) { return y * COLS + x; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function stepGenerate(count) {
  for (let i = 0; i < count && stack.length > 0; i++) {
    const [x, y] = stack[stack.length - 1];
    const dirs = shuffle([N, S, E, W]);
    let moved = false;
    for (const d of dirs) {
      const nx = x + DX[d], ny = y + DY[d];
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      if (visited[idx(nx, ny)]) continue;
      cells[idx(x, y)] |= d;
      cells[idx(nx, ny)] |= OPPOSITE[d];
      visited[idx(nx, ny)] = 1;
      stack.push([nx, ny]);
      moved = true;
      break;
    }
    if (!moved) stack.pop();
  }
  if (stack.length === 0) {
    generating = false;
    done = true;
    document.getElementById('status').textContent = 'Solve it! (arrow keys / WASD)';
  }
}

// BFS solver
function solveMaze() {
  if (!done) return;
  const endX = COLS - 1, endY = ROWS - 1;
  const prev = new Int32Array(COLS * ROWS).fill(-1);
  const queue = [idx(0, 0)];
  prev[idx(0, 0)] = idx(0, 0);
  while (queue.length) {
    const cur = queue.shift();
    const cx = cur % COLS, cy = (cur / COLS) | 0;
    if (cx === endX && cy === endY) break;
    for (const d of [N, S, E, W]) {
      if (!(cells[cur] & d)) continue;
      const nx = cx + DX[d], ny = cy + DY[d];
      const ni = idx(nx, ny);
      if (prev[ni] !== -1) continue;
      prev[ni] = cur;
      queue.push(ni);
    }
  }
  // Trace back
  path = [];
  let cur = idx(endX, endY);
  while (cur !== idx(0, 0)) {
    path.push(cur);
    cur = prev[cur];
  }
  path.push(idx(0, 0));
  path.reverse();
  solutionShown = true;
  document.getElementById('status').textContent = 'Solution shown (' + (path.length - 1) + ' steps)';
}

function draw() {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const C = CELL;

  // Draw solution path
  if (solutionShown && path) {
    ctx.fillStyle = 'rgba(74,122,154,0.25)';
    for (const i of path) {
      const px = (i % COLS) * C, py = ((i / COLS) | 0) * C;
      ctx.fillRect(px + 1, py + 1, C - 1, C - 1);
    }
  }

  // Draw generation frontier
  if (generating && stack.length) {
    ctx.fillStyle = 'rgba(100,180,100,0.15)';
    for (const [sx, sy] of stack) {
      ctx.fillRect(sx * C + 1, sy * C + 1, C - 1, C - 1);
    }
    const [hx, hy] = stack[stack.length - 1];
    ctx.fillStyle = 'rgba(100,200,100,0.5)';
    ctx.fillRect(hx * C + 1, hy * C + 1, C - 1, C - 1);
  }

  // Draw walls
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 1;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = cells[idx(x, y)];
      const px = x * C, py = y * C;
      ctx.beginPath();
      if (!(cell & N) && y > 0) { ctx.moveTo(px, py); ctx.lineTo(px + C, py); }
      if (!(cell & S)) { ctx.moveTo(px, py + C); ctx.lineTo(px + C, py + C); }
      if (!(cell & W) && x > 0) { ctx.moveTo(px, py); ctx.lineTo(px, py + C); }
      if (!(cell & E)) { ctx.moveTo(px + C, py); ctx.lineTo(px + C, py + C); }
      ctx.stroke();
    }
  }

  // Outer border
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(0.75, 0.75, canvas.width - 1.5, canvas.height - 1.5);

  // Start / end markers
  ctx.fillStyle = '#2d6a2d';
  ctx.fillRect(2, 2, C - 3, C - 3);
  ctx.fillStyle = '#6a2d2d';
  ctx.fillRect((COLS - 1) * C + 2, (ROWS - 1) * C + 2, C - 3, C - 3);

  // Player
  if (done) {
    const px = playerX * C, py = playerY * C;
    ctx.fillStyle = '#f0c040';
    ctx.beginPath();
    ctx.arc(px + C / 2, py + C / 2, C * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Win check
    if (playerX === COLS - 1 && playerY === ROWS - 1) {
      document.getElementById('status').textContent = 'You reached the end!';
    }
  }
}

// Animation loop
let last = 0;
function loop(ts) {
  if (generating) {
    const speed = parseInt(document.getElementById('speedSlider').value);
    if (ts - last > 16) {
      stepGenerate(Math.max(1, speed / 5 | 0));
      last = ts;
    }
  }
  draw();
  requestAnimationFrame(loop);
}

// Controls
document.getElementById('btnNew').addEventListener('click', newMaze);
document.getElementById('btnSolve').addEventListener('click', solveMaze);
document.getElementById('btnSkip').addEventListener('click', () => {
  if (!generating) return;
  while (stack.length) stepGenerate(1000);
});
document.getElementById('sizeSlider').addEventListener('change', newMaze);

// Player movement
function tryMove(dx, dy) {
  if (!done) return;
  const dir = dx === 1 ? E : dx === -1 ? W : dy === 1 ? S : N;
  if (cells[idx(playerX, playerY)] & dir) {
    playerX += dx;
    playerY += dy;
  }
}

canvas.addEventListener('keydown', e => {
  const map = {
    ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
    W: [0,-1], S: [0,1], A: [-1,0], D: [1,0],
  };
  if (map[e.key]) { e.preventDefault(); tryMove(...map[e.key]); }
});

window.addEventListener('resize', () => { if (!generating) { resize(); draw(); } });

newMaze();
requestAnimationFrame(loop);
</script>
</body>
</html>
