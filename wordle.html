<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #a0a0b8; font: 12px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #top { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #0a0a14; border-bottom: 1px solid #141428; flex-shrink: 0; flex-wrap: wrap; }
  h1 { font-size: 11px; color: #808098; letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; }
  .sep { width: 1px; height: 18px; background: #1a1a30; margin: 0 2px; }
  button { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; border-radius: 3px; }
  button:hover { background: #14142a; color: #9090c0; }
  button.active { background: #1a2a50; color: #80b0ff; border-color: #3060a0; }
  select { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; font: 11px 'Courier New', monospace; padding: 2px 6px; border-radius: 3px; }
  label { color: #505068; font-size: 11px; display: flex; align-items: center; gap: 4px; }

  #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 16px; overflow: auto; }

  #board { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; gap: 6px; }
  .tile { width: 56px; height: 56px; border: 2px solid #1a1a30; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #d0d0e0; text-transform: uppercase; transition: transform 0.3s, background 0.3s, border-color 0.3s; }
  .tile.filled { border-color: #3a3a60; animation: popIn 0.1s ease; }
  .tile.correct { background: #2a6a2a; border-color: #3a8a3a; }
  .tile.present { background: #6a6a2a; border-color: #8a8a3a; }
  .tile.absent { background: #2a2a3a; border-color: #3a3a4a; }
  .tile.reveal { animation: flip 0.5s ease; }
  @keyframes popIn { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
  @keyframes flip { 0% { transform: rotateX(0); } 50% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
  .row.shake { animation: shake 0.3s ease; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

  #keyboard { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .kb-row { display: flex; gap: 4px; }
  .key { min-width: 36px; height: 44px; border: none; border-radius: 4px; background: #1a1a30; color: #a0a0c0; font: bold 13px 'Courier New', monospace; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; transition: background 0.2s; }
  .key:hover { background: #2a2a50; }
  .key.wide { min-width: 56px; font-size: 11px; }
  .key.correct { background: #2a6a2a; color: #c0f0c0; }
  .key.present { background: #6a6a2a; color: #f0f0c0; }
  .key.absent { background: #15151f; color: #404060; }

  #message { min-height: 28px; font-size: 14px; color: #c0c0d8; text-align: center; }
  #message.win { color: #50c050; }
  #message.lose { color: #c05050; }

  #stats { display: flex; gap: 24px; justify-content: center; margin-top: 8px; }
  .stat-box { text-align: center; }
  .stat-box .stat-num { font-size: 20px; color: #8080b0; }
  .stat-box .stat-label { font-size: 9px; color: #404060; text-transform: uppercase; }

  #statusBar { padding: 4px 12px; background: #06060c; border-top: 1px solid #101020; font-size: 10px; color: #303050; display: flex; gap: 16px; flex-shrink: 0; }
  .stat b { color: #505078; font-weight: normal; }

  #customModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  #customModal.show { display: flex; }
  #customBox { background: #0c0c1a; border: 1px solid #2a2a50; border-radius: 8px; padding: 24px; width: 320px; }
  #customBox h3 { font-size: 12px; color: #808098; font-weight: normal; margin-bottom: 8px; }
  #customBox textarea { width: 100%; height: 120px; background: #080810; border: 1px solid #1a1a30; color: #a0a0b8; font: 11px 'Courier New', monospace; padding: 8px; border-radius: 4px; resize: vertical; }
  #customBox .btn-row { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div id="top">
  <h1>Wordle</h1>
  <div class="sep"></div>
  <select id="selWordLen" onchange="wordLength=+this.value;newGame()">
    <option value="4">4 letters</option>
    <option value="5" selected>5 letters</option>
    <option value="6">6 letters</option>
    <option value="7">7 letters</option>
  </select>
  <select id="selAttempts" onchange="maxAttempts=+this.value;newGame()">
    <option value="4">4 tries</option>
    <option value="6" selected>6 tries</option>
    <option value="8">8 tries</option>
    <option value="10">10 tries</option>
  </select>
  <div class="sep"></div>
  <label><input type="checkbox" id="chkHard" onchange="hardMode=this.checked"> Hard Mode</label>
  <div class="sep"></div>
  <button onclick="newGame()">New Game (R)</button>
  <button onclick="showCustom()">Custom Words</button>
</div>

<div id="main">
  <div id="board"></div>
  <div id="message">&nbsp;</div>
  <div id="keyboard"></div>
  <div id="stats">
    <div class="stat-box"><div class="stat-num" id="sPlayed">0</div><div class="stat-label">Played</div></div>
    <div class="stat-box"><div class="stat-num" id="sWinPct">0</div><div class="stat-label">Win %</div></div>
    <div class="stat-box"><div class="stat-num" id="sStreak">0</div><div class="stat-label">Streak</div></div>
    <div class="stat-box"><div class="stat-num" id="sMaxStreak">0</div><div class="stat-label">Best</div></div>
  </div>
</div>

<div id="customModal">
  <div id="customBox">
    <h3>Custom Word List (one word per line)</h3>
    <textarea id="customWords" placeholder="Enter words here...&#10;apple&#10;brave&#10;crane"></textarea>
    <div class="btn-row">
      <button onclick="closeCustom()">Cancel</button>
      <button onclick="applyCustom()">Apply & New Game</button>
    </div>
  </div>
</div>

<div id="statusBar">
  <span class="stat">Type letters to guess | Enter to submit | Backspace to delete</span>
</div>

let wordLength = 5;
let maxAttempts = 6;
let hardMode = false;
let customWordList = null;

let target = '';
let guesses = [];
let currentGuess = '';
let gameOver = false;
let currentRow = 0;

// Stats
let played = 0, wins = 0, streak = 0, maxStreak = 0;

// ── Game ─────────────────────────────────────────────────────────
function getWordList() {
  if (customWordList && customWordList.length > 0) return customWordList;
  const raw = wordLists[wordLength] || wordLists[5];
  return raw.split(',').filter(w => w.length === wordLength);
}

function newGame() {
  const words = getWordList();
  target = words[Math.random() * words.length | 0].toLowerCase();
  guesses = [];
  currentGuess = '';
  gameOver = false;
  currentRow = 0;
  buildBoard();
  buildKeyboard();
  document.getElementById('message').textContent = '\u00a0';
  document.getElementById('message').className = '';
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < maxAttempts; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row${r}`;
    for (let c = 0; c < wordLength; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile${r}_${c}`;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const rows = ['qwertyuiop', 'asdfghjkl', 'zxcvbnm'];
  rows.forEach((row, ri) => {
    const kbRow = document.createElement('div');
    kbRow.className = 'kb-row';
    if (ri === 2) {
      const enter = document.createElement('button');
      enter.className = 'key wide';
      enter.textContent = 'Enter';
      enter.onclick = submitGuess;
      kbRow.appendChild(enter);
    }
    for (const ch of row) {
      const key = document.createElement('button');
      key.className = 'key';
      key.id = `key_${ch}`;
      key.textContent = ch;
      key.onclick = () => addLetter(ch);
      kbRow.appendChild(key);
    }
    if (ri === 2) {
      const del = document.createElement('button');
      del.className = 'key wide';
      del.textContent = '⌫';
      del.onclick = deleteLetter;
      kbRow.appendChild(del);
    }
    kb.appendChild(kbRow);
  });
}

function addLetter(ch) {
  if (gameOver || currentGuess.length >= wordLength) return;
  currentGuess += ch;
  updateCurrentRow();
}

function deleteLetter() {
  if (gameOver || currentGuess.length === 0) return;
  currentGuess = currentGuess.slice(0, -1);
  updateCurrentRow();
}

function updateCurrentRow() {
  for (let c = 0; c < wordLength; c++) {
    const tile = document.getElementById(`tile${currentRow}_${c}`);
    if (c < currentGuess.length) {
      tile.textContent = currentGuess[c];
      tile.classList.add('filled');
    } else {
      tile.textContent = '';
      tile.classList.remove('filled');
    }
  }
}

function submitGuess() {
  if (gameOver) return;
  if (currentGuess.length !== wordLength) {
    shakeRow(currentRow);
    showMessage('Not enough letters');
    return;
  }

  // Check if valid word (in our list)
  const words = getWordList();
  if (!words.includes(currentGuess)) {
    shakeRow(currentRow);
    showMessage('Not in word list');
    return;
  }

  // Hard mode checks
  if (hardMode && guesses.length > 0) {
    const lastResult = evaluateGuess(guesses[guesses.length - 1]);
    for (let i = 0; i < wordLength; i++) {
      if (lastResult[i] === 'correct' && currentGuess[i] !== guesses[guesses.length - 1][i]) {
        shakeRow(currentRow);
        showMessage(`Position ${i + 1} must be ${guesses[guesses.length - 1][i].toUpperCase()}`);
        return;
      }
    }
    for (let i = 0; i < wordLength; i++) {
      if (lastResult[i] === 'present' && !currentGuess.includes(guesses[guesses.length - 1][i])) {
        shakeRow(currentRow);
        showMessage(`Must include ${guesses[guesses.length - 1][i].toUpperCase()}`);
        return;
      }
    }
  }

  const result = evaluateGuess(currentGuess);
  revealRow(currentRow, result);
  guesses.push(currentGuess);

  const won = result.every(r => r === 'correct');
  if (won) {
    gameOver = true;
    played++; wins++; streak++;
    if (streak > maxStreak) maxStreak = streak;
    setTimeout(() => {
      showMessage(['Genius!', 'Magnificent!', 'Impressive!', 'Splendid!', 'Great!', 'Phew!'][Math.min(currentRow, 5)], 'win');
      bounceRow(currentRow);
    }, wordLength * 300 + 200);
  } else if (currentRow >= maxAttempts - 1) {
    gameOver = true;
    played++; streak = 0;
    setTimeout(() => showMessage(target.toUpperCase(), 'lose'), wordLength * 300 + 200);
  }

  currentRow++;
  currentGuess = '';
  updateStats();
}

function evaluateGuess(guess) {
  const result = new Array(wordLength).fill('absent');
  const targetArr = target.split('');
  const guessArr = guess.split('');

  // First pass: correct
  for (let i = 0; i < wordLength; i++) {
    if (guessArr[i] === targetArr[i]) {
      result[i] = 'correct';
      targetArr[i] = null;
      guessArr[i] = null;
    }
  }
  // Second pass: present
  for (let i = 0; i < wordLength; i++) {
    if (guessArr[i] === null) continue;
    const idx = targetArr.indexOf(guessArr[i]);
    if (idx >= 0) {
      result[i] = 'present';
      targetArr[idx] = null;
    }
  }
  return result;
}

function revealRow(row, result) {
  for (let c = 0; c < wordLength; c++) {
    const tile = document.getElementById(`tile${row}_${c}`);
    setTimeout(() => {
      tile.classList.add('reveal', result[c]);
    }, c * 300);

    // Update keyboard
    const ch = guesses.length > 0 ? currentGuess[c] : tile.textContent;
    setTimeout(() => {
      const key = document.getElementById(`key_${ch}`);
      if (!key) return;
      if (result[c] === 'correct') {
        key.className = 'key correct';
      } else if (result[c] === 'present' && !key.classList.contains('correct')) {
        key.className = 'key present';
      } else if (!key.classList.contains('correct') && !key.classList.contains('present')) {
        key.className = 'key absent';
      }
    }, c * 300 + 250);
  }
}

function shakeRow(row) {
  const el = document.getElementById(`row${row}`);
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 300);
}

function bounceRow(row) {
  for (let c = 0; c < wordLength; c++) {
    const tile = document.getElementById(`tile${row}_${c}`);
    setTimeout(() => {
      tile.style.animation = 'bounce 0.4s ease';
    }, c * 100);
  }
}

function showMessage(text, cls = '') {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = cls;
}

function updateStats() {
  document.getElementById('sPlayed').textContent = played;
  document.getElementById('sWinPct').textContent = played > 0 ? Math.round(wins / played * 100) : 0;
  document.getElementById('sStreak').textContent = streak;
  document.getElementById('sMaxStreak').textContent = maxStreak;
}

// ── Custom words ─────────────────────────────────────────────────
function showCustom() {
  document.getElementById('customModal').classList.add('show');
}
function closeCustom() {
  document.getElementById('customModal').classList.remove('show');
}
function applyCustom() {
  const text = document.getElementById('customWords').value.trim();
  if (text) {
    const words = text.split(/\s+/).map(w => w.toLowerCase().replace(/[^a-z]/g, '')).filter(w => w.length > 0);
    if (words.length > 0) {
      const len = words[0].length;
      customWordList = words.filter(w => w.length === len);
      wordLength = len;
      document.getElementById('selWordLen').value = len;
    }
  } else {
    customWordList = null;
  }
  closeCustom();
  newGame();
}

// ── Keyboard input ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Enter') submitGuess();
  else if (e.key === 'Backspace') deleteLetter();
  else if (e.key === 'r' && !e.ctrlKey) newGame();
  else if (/^[a-z]$/i.test(e.key)) addLetter(e.key.toLowerCase());
});

newGame();
</script>
