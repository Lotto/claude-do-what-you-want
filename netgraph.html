<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Graph</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #a0a0b8; font: 12px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #top { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #0a0a14; border-bottom: 1px solid #141428; flex-shrink: 0; flex-wrap: wrap; }
  h1 { font-size: 11px; color: #808098; letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; }
  .sep { width: 1px; height: 18px; background: #1a1a30; margin: 0 2px; }
  button { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; border-radius: 3px; }
  button:hover { background: #14142a; color: #9090c0; }
  button.active { background: #1a2a50; color: #80b0ff; border-color: #3060a0; }
  select { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; font: 11px 'Courier New', monospace; padding: 2px 6px; border-radius: 3px; }
  label { color: #505068; font-size: 11px; display: flex; align-items: center; gap: 4px; }
  input[type="range"] { width: 60px; accent-color: #4060a0; }

  canvas { display: block; flex: 1; }

  #statusBar { padding: 4px 12px; background: #06060c; border-top: 1px solid #101020; font-size: 10px; color: #303050; display: flex; gap: 16px; flex-shrink: 0; }
  .stat b { color: #505078; font-weight: normal; }

  #editPanel {
    position: absolute; top: 50px; right: 12px; width: 200px; background: #0a0a16;
    border: 1px solid #1a1a30; border-radius: 6px; padding: 10px; display: none; z-index: 5;
  }
  #editPanel.show { display: block; }
  .ep-title { font-size: 9px; color: #404060; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .ep-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .ep-row label { font-size: 10px; width: 50px; flex-shrink: 0; }
  .ep-input { flex: 1; background: #08080e; border: 1px solid #141428; color: #c0c0e0; font: 11px 'Courier New', monospace; padding: 3px 6px; outline: none; border-radius: 3px; }
</style>
</head>
<body>

<div id="top">
  <h1>Network Graph</h1>
  <div class="sep"></div>
  <button id="btnNode" class="active" onclick="setTool('node')">Add Node (N)</button>
  <button id="btnEdge" onclick="setTool('edge')">Add Edge (E)</button>
  <button id="btnDrag" onclick="setTool('drag')">Drag (D)</button>
  <button id="btnErase" onclick="setTool('erase')">Erase (X)</button>
  <div class="sep"></div>
  <label>Repulsion: <input type="range" id="rRepulse" min="500" max="20000" value="5000" oninput="repulsion=+this.value"></label>
  <label>Attraction: <input type="range" id="rAttract" min="1" max="100" value="20" oninput="attraction=this.value/1000"></label>
  <label>Damping: <input type="range" id="rDamp" min="50" max="99" value="90" oninput="damping=this.value/100"></label>
  <div class="sep"></div>
  <button id="btnSim" class="active" onclick="simulating=!simulating;this.classList.toggle('active',simulating)">Simulate</button>
  <button onclick="centerGraph()">Center</button>
  <button onclick="clearAll()">Clear</button>
  <div class="sep"></div>
  <select id="selPreset" onchange="loadPreset(this.value);this.value=''">
    <option value="">-- Presets --</option>
    <option value="tree">Binary Tree</option>
    <option value="mesh">Mesh Grid</option>
    <option value="social">Social Network</option>
    <option value="ring">Ring</option>
    <option value="petersen">Petersen Graph</option>
    <option value="random">Random (20)</option>
  </select>
</div>

<canvas id="canvas"></canvas>

<div id="editPanel">
  <div class="ep-title">Edit Node</div>
  <div class="ep-row"><label>Label:</label><input class="ep-input" id="epLabel" oninput="updateSelectedLabel(this.value)"></div>
  <div class="ep-row"><label>Color:</label><input type="color" id="epColor" class="ep-input" style="height:24px;padding:1px" oninput="updateSelectedColor(this.value)"></div>
  <div class="ep-row"><label>Size:</label><input type="range" id="epSize" min="8" max="40" value="16" class="ep-input" oninput="updateSelectedSize(+this.value)"></div>
  <div class="ep-row"><button onclick="pinSelected()" id="btnPin" style="width:100%">Pin / Unpin</button></div>
</div>

<div id="statusBar">
  <span class="stat">Nodes: <b id="statNodes">0</b></span>
  <span class="stat">Edges: <b id="statEdges">0</b></span>
  <span class="stat">Click = add/select | Drag = move | Double-click = edit label</span>
</div>

<script>
'use strict';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = canvas.clientWidth; H = canvas.height = canvas.clientHeight; }
resize();
window.addEventListener('resize', resize);

// ── State ────────────────────────────────────────────────────────
let nodes = [];
let edges = [];
let nextId = 1;
let tool = 'node';
let simulating = true;
let repulsion = 5000;
let attraction = 0.02;
let damping = 0.9;
let selected = null;
let hovered = null;
let dragging = null;
let edgeStart = null;
let panX = 0, panY = 0, zoom = 1;
let mousePos = { x: 0, y: 0 };
let mouseDown = false;
let panning = false;
let panStart = { x: 0, y: 0, px: 0, py: 0 };

const COLORS = ['#e06060','#60a0e0','#60c080','#c0a060','#a070c0','#c07090','#70c0c0','#e0a0a0','#a0c060','#6080c0'];

function createNode(x, y, label) {
  return {
    id: nextId++, x, y, vx: 0, vy: 0,
    label: label || 'Node ' + nextId,
    color: COLORS[(nextId - 1) % COLORS.length],
    r: 16, pinned: false,
  };
}

// ── Screen <-> World ────────────────────────────────────────────
function toWorld(sx, sy) {
  return { x: (sx - W / 2 - panX) / zoom, y: (sy - H / 2 - panY) / zoom };
}
function toScreen(wx, wy) {
  return { x: wx * zoom + W / 2 + panX, y: wy * zoom + H / 2 + panY };
}

// ── Force-directed layout ───────────────────────────────────────
function simulate() {
  if (!simulating) return;

  // Repulsion (Coulomb)
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      if (dist < 1) dist = 1;
      const force = repulsion / (dist * dist);
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      if (!a.pinned) { a.vx -= fx; a.vy -= fy; }
      if (!b.pinned) { b.vx += fx; b.vy += fy; }
    }
  }

  // Attraction (Hooke spring along edges)
  for (const e of edges) {
    const a = e.a, b = e.b;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = (dist - 100) * attraction;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    if (!a.pinned) { a.vx += fx; a.vy += fy; }
    if (!b.pinned) { b.vx -= fx; b.vy -= fy; }
  }

  // Center gravity (weak pull toward origin)
  for (const n of nodes) {
    if (n.pinned) continue;
    n.vx -= n.x * 0.0005;
    n.vy -= n.y * 0.0005;
  }

  // Integrate
  for (const n of nodes) {
    if (n.pinned || n === dragging) { n.vx = 0; n.vy = 0; continue; }
    n.vx *= damping;
    n.vy *= damping;
    // Clamp velocity
    const speed = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
    if (speed > 50) { n.vx = (n.vx / speed) * 50; n.vy = (n.vy / speed) * 50; }
    n.x += n.vx;
    n.y += n.vy;
  }
}

// ── Render ──────────────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  // Grid (world space)
  ctx.save();
  ctx.translate(W / 2 + panX, H / 2 + panY);
  ctx.scale(zoom, zoom);

  const gridSize = 50;
  const viewW = W / zoom, viewH = H / zoom;
  const ox = -panX / zoom, oy = -panY / zoom;
  ctx.strokeStyle = '#0c0c1a';
  ctx.lineWidth = 1 / zoom;
  const gx0 = Math.floor((ox - viewW / 2) / gridSize) * gridSize;
  const gy0 = Math.floor((oy - viewH / 2) / gridSize) * gridSize;
  for (let x = gx0; x < ox + viewW / 2; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, oy - viewH / 2); ctx.lineTo(x, oy + viewH / 2); ctx.stroke();
  }
  for (let y = gy0; y < oy + viewH / 2; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(ox - viewW / 2, y); ctx.lineTo(ox + viewW / 2, y); ctx.stroke();
  }

  // Edges
  for (const e of edges) {
    const isHigh = (selected && (e.a === selected || e.b === selected));
    ctx.strokeStyle = isHigh ? '#4070c0' : '#1a2a50';
    ctx.lineWidth = isHigh ? 2.5 / zoom : 1.5 / zoom;
    ctx.beginPath();
    ctx.moveTo(e.a.x, e.a.y);
    ctx.lineTo(e.b.x, e.b.y);
    ctx.stroke();

    // Edge weight/label
    if (e.weight) {
      const mx = (e.a.x + e.b.x) / 2, my = (e.a.y + e.b.y) / 2;
      ctx.font = `${10 / zoom}px "Courier New",monospace`;
      ctx.fillStyle = '#404060';
      ctx.textAlign = 'center';
      ctx.fillText(e.weight, mx, my - 5 / zoom);
    }
  }

  // Edge creation preview
  if (tool === 'edge' && edgeStart && mouseDown) {
    const wp = toWorld(mousePos.x, mousePos.y);
    ctx.strokeStyle = '#4060a040';
    ctx.lineWidth = 2 / zoom;
    ctx.setLineDash([5 / zoom, 5 / zoom]);
    ctx.beginPath();
    ctx.moveTo(edgeStart.x, edgeStart.y);
    ctx.lineTo(wp.x, wp.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Nodes
  for (const n of nodes) {
    const isSel = n === selected;
    const isHov = n === hovered;

    // Glow
    if (isSel || isHov) {
      const glow = ctx.createRadialGradient(n.x, n.y, n.r, n.x, n.y, n.r * 2.5);
      glow.addColorStop(0, n.color + '30');
      glow.addColorStop(1, n.color + '00');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body
    ctx.fillStyle = n.color + '40';
    ctx.strokeStyle = n.color;
    ctx.lineWidth = (isSel ? 3 : isHov ? 2 : 1.5) / zoom;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Pin
    if (n.pinned) {
      ctx.fillStyle = '#ffffff60';
      ctx.beginPath();
      ctx.arc(n.x, n.y, 3 / zoom, 0, Math.PI * 2);
      ctx.fill();
    }

    // Label
    ctx.font = `bold ${11 / zoom}px "Courier New",monospace`;
    ctx.fillStyle = '#d0d0e0';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = n.label.length > 8 ? n.label.slice(0, 7) + '..' : n.label;
    ctx.fillText(label, n.x, n.y + n.r + 12 / zoom);

    // Degree count
    const deg = edges.filter(e => e.a === n || e.b === n).length;
    if (deg > 0) {
      ctx.font = `${8 / zoom}px "Courier New",monospace`;
      ctx.fillStyle = '#404060';
      ctx.fillText('d=' + deg, n.x, n.y - n.r - 8 / zoom);
    }
  }

  ctx.restore();
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Stats
  document.getElementById('statNodes').textContent = nodes.length;
  document.getElementById('statEdges').textContent = edges.length;
}

// ── Tools ───────────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  edgeStart = null;
  ['node','edge','drag','erase'].forEach(n => {
    const btn = document.getElementById('btn' + n.charAt(0).toUpperCase() + n.slice(1));
    if (btn) btn.classList.toggle('active', n === t);
  });
  canvas.style.cursor = t === 'drag' ? 'grab' : t === 'erase' ? 'pointer' : 'crosshair';
}

function nodeAt(sx, sy) {
  const wp = toWorld(sx, sy);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = wp.x - n.x, dy = wp.y - n.y;
    if (dx * dx + dy * dy <= (n.r + 4) * (n.r + 4)) return n;
  }
  return null;
}

function selectNode(n) {
  selected = n;
  const panel = document.getElementById('editPanel');
  if (n) {
    panel.classList.add('show');
    document.getElementById('epLabel').value = n.label;
    document.getElementById('epColor').value = n.color;
    document.getElementById('epSize').value = n.r;
  } else {
    panel.classList.remove('show');
  }
}

function updateSelectedLabel(v) { if (selected) selected.label = v; }
function updateSelectedColor(v) { if (selected) selected.color = v; }
function updateSelectedSize(v) { if (selected) selected.r = v; }
function pinSelected() { if (selected) selected.pinned = !selected.pinned; }

// ── Input ───────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const sx = e.clientX - canvas.getBoundingClientRect().left;
  const sy = e.clientY - canvas.getBoundingClientRect().top;
  mouseDown = true;

  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    panning = true;
    panStart = { x: sx, y: sy, px: panX, py: panY };
    canvas.style.cursor = 'grabbing';
    return;
  }

  const hit = nodeAt(sx, sy);

  if (tool === 'node') {
    if (hit) {
      selectNode(hit);
      dragging = hit;
    } else {
      const wp = toWorld(sx, sy);
      const n = createNode(wp.x, wp.y);
      nodes.push(n);
      selectNode(n);
    }
  } else if (tool === 'edge') {
    if (hit) {
      if (!edgeStart) {
        edgeStart = hit;
        selectNode(hit);
      } else if (hit !== edgeStart) {
        // Check no duplicate edge
        const exists = edges.some(e =>
          (e.a === edgeStart && e.b === hit) || (e.a === hit && e.b === edgeStart));
        if (!exists) {
          edges.push({ a: edgeStart, b: hit });
        }
        edgeStart = null;
      }
    } else {
      edgeStart = null;
    }
  } else if (tool === 'drag') {
    if (hit) {
      dragging = hit;
      selectNode(hit);
      canvas.style.cursor = 'grabbing';
    } else {
      panning = true;
      panStart = { x: sx, y: sy, px: panX, py: panY };
      canvas.style.cursor = 'grabbing';
    }
  } else if (tool === 'erase') {
    if (hit) {
      edges = edges.filter(e => e.a !== hit && e.b !== hit);
      nodes = nodes.filter(n => n !== hit);
      if (selected === hit) selectNode(null);
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const sx = e.clientX - canvas.getBoundingClientRect().left;
  const sy = e.clientY - canvas.getBoundingClientRect().top;
  mousePos = { x: sx, y: sy };

  if (panning) {
    panX = panStart.px + (sx - panStart.x);
    panY = panStart.py + (sy - panStart.y);
    return;
  }

  if (dragging) {
    const wp = toWorld(sx, sy);
    dragging.x = wp.x;
    dragging.y = wp.y;
    return;
  }

  hovered = nodeAt(sx, sy);
});

canvas.addEventListener('mouseup', () => {
  mouseDown = false;
  dragging = null;
  panning = false;
  if (tool === 'drag') canvas.style.cursor = 'grab';
});

canvas.addEventListener('dblclick', e => {
  const sx = e.clientX - canvas.getBoundingClientRect().left;
  const sy = e.clientY - canvas.getBoundingClientRect().top;
  const hit = nodeAt(sx, sy);
  if (hit) {
    const label = prompt('Node label:', hit.label);
    if (label !== null) { hit.label = label; selectNode(hit); }
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const sx = e.clientX - canvas.getBoundingClientRect().left;
  const sy = e.clientY - canvas.getBoundingClientRect().top;
  // Zoom toward cursor
  const wx = (sx - W / 2 - panX) / zoom;
  const wy = (sy - H / 2 - panY) / zoom;
  zoom *= factor;
  zoom = Math.max(0.1, Math.min(5, zoom));
  panX = sx - W / 2 - wx * zoom;
  panY = sy - H / 2 - wy * zoom;
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

// ── Center ──────────────────────────────────────────────────────
function centerGraph() {
  if (nodes.length === 0) return;
  let cx = 0, cy = 0;
  nodes.forEach(n => { cx += n.x; cy += n.y; });
  cx /= nodes.length; cy /= nodes.length;
  panX = -cx * zoom;
  panY = -cy * zoom;
}

function clearAll() {
  nodes = []; edges = []; selected = null; edgeStart = null; nextId = 1;
  selectNode(null);
}

// ── Presets ──────────────────────────────────────────────────────
function loadPreset(name) {
  if (!name) return;
  clearAll();

  if (name === 'tree') {
    // Binary tree depth 4
    const make = (x, y, depth, spread) => {
      const n = createNode(x, y);
      n.label = '' + (nodes.length + 1);
      nodes.push(n);
      if (depth <= 0) return n;
      const left = make(x - spread, y + 80, depth - 1, spread * 0.55);
      const right = make(x + spread, y + 80, depth - 1, spread * 0.55);
      edges.push({ a: n, b: left });
      edges.push({ a: n, b: right });
      return n;
    };
    make(0, -150, 4, 200);
  } else if (name === 'mesh') {
    const rows = 4, cols = 5, sp = 80;
    const grid = [];
    for (let r = 0; r < rows; r++) {
      grid[r] = [];
      for (let c = 0; c < cols; c++) {
        const n = createNode((c - cols / 2 + 0.5) * sp, (r - rows / 2 + 0.5) * sp);
        n.label = `${r},${c}`;
        nodes.push(n);
        grid[r][c] = n;
        if (c > 0) edges.push({ a: grid[r][c - 1], b: n });
        if (r > 0) edges.push({ a: grid[r - 1][c], b: n });
      }
    }
  } else if (name === 'social') {
    const names = ['Alice','Bob','Carol','Dave','Eve','Frank','Grace','Hank','Iris','Jack','Kate','Leo'];
    const ns = names.map((nm, i) => {
      const a = (i / names.length) * Math.PI * 2;
      const n = createNode(Math.cos(a) * 150, Math.sin(a) * 150);
      n.label = nm;
      nodes.push(n);
      return n;
    });
    // Random connections
    for (let i = 0; i < ns.length; i++) {
      const conns = 2 + Math.floor(Math.random() * 3);
      for (let c = 0; c < conns; c++) {
        const j = Math.floor(Math.random() * ns.length);
        if (j !== i && !edges.some(e => (e.a === ns[i] && e.b === ns[j]) || (e.a === ns[j] && e.b === ns[i]))) {
          edges.push({ a: ns[i], b: ns[j] });
        }
      }
    }
  } else if (name === 'ring') {
    const count = 12;
    const ns = [];
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2;
      const n = createNode(Math.cos(a) * 150, Math.sin(a) * 150);
      n.label = '' + (i + 1);
      nodes.push(n);
      ns.push(n);
    }
    for (let i = 0; i < count; i++) edges.push({ a: ns[i], b: ns[(i + 1) % count] });
  } else if (name === 'petersen') {
    const outer = [], inner = [];
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      const o = createNode(Math.cos(a) * 150, Math.sin(a) * 150);
      o.label = '' + (i + 1);
      nodes.push(o); outer.push(o);
      const inn = createNode(Math.cos(a) * 70, Math.sin(a) * 70);
      inn.label = '' + (i + 6);
      nodes.push(inn); inner.push(inn);
    }
    for (let i = 0; i < 5; i++) {
      edges.push({ a: outer[i], b: outer[(i + 1) % 5] });
      edges.push({ a: outer[i], b: inner[i] });
      edges.push({ a: inner[i], b: inner[(i + 2) % 5] });
    }
  } else if (name === 'random') {
    const count = 20;
    const ns = [];
    for (let i = 0; i < count; i++) {
      const n = createNode((Math.random() - 0.5) * 400, (Math.random() - 0.5) * 300);
      n.label = '' + (i + 1);
      nodes.push(n);
      ns.push(n);
    }
    for (let i = 0; i < count * 1.5; i++) {
      const a = Math.floor(Math.random() * count);
      const b = Math.floor(Math.random() * count);
      if (a !== b && !edges.some(e => (e.a === ns[a] && e.b === ns[b]) || (e.a === ns[b] && e.b === ns[a]))) {
        edges.push({ a: ns[a], b: ns[b] });
      }
    }
  }

  centerGraph();
}

// ── Keyboard ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'n') setTool('node');
  if (e.key === 'e') setTool('edge');
  if (e.key === 'd') setTool('drag');
  if (e.key === 'x') setTool('erase');
  if (e.key === ' ') { e.preventDefault(); simulating = !simulating; document.getElementById('btnSim').classList.toggle('active', simulating); }
  if (e.key === 'Delete' && selected) {
    edges = edges.filter(e => e.a !== selected && e.b !== selected);
    nodes = nodes.filter(n => n !== selected);
    selectNode(null);
  }
  if (e.key === 'p' && selected) { selected.pinned = !selected.pinned; }
  if (e.key === 'c') centerGraph();
});

// ── Loop ────────────────────────────────────────────────────────
function loop() {
  simulate();
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Load default
loadPreset('social');
</script>
</body>
</html>
