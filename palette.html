<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #a0a0b8; font: 12px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #top { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #0a0a14; border-bottom: 1px solid #141428; flex-shrink: 0; flex-wrap: wrap; }
  h1 { font-size: 11px; color: #808098; letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; }
  .sep { width: 1px; height: 18px; background: #1a1a30; margin: 0 2px; }
  button { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; border-radius: 3px; }
  button:hover { background: #14142a; color: #9090c0; }
  button.active { background: #1a2a50; color: #80b0ff; border-color: #3060a0; }
  select { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; font: 11px 'Courier New', monospace; padding: 2px 6px; border-radius: 3px; }
  label { color: #505068; font-size: 11px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  input[type="range"] { width: 80px; accent-color: #4060a0; }
  input[type="color"] { width: 28px; height: 22px; border: 1px solid #1a1a30; background: #0c0c18; cursor: pointer; border-radius: 3px; }

  #main { display: flex; flex: 1; overflow: hidden; }

  #paletteArea { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #swatches { display: flex; flex: 1; min-height: 0; }
  .swatch {
    flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
    padding: 16px 8px; cursor: pointer; transition: flex 0.3s; position: relative; min-width: 0;
  }
  .swatch:hover { flex: 1.3; }
  .swatch.locked::after {
    content: 'LOCKED'; position: absolute; top: 10px; font-size: 9px; letter-spacing: 0.1em;
    color: rgba(0,0,0,0.5); background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 10px;
  }
  .swatch-info {
    background: rgba(0,0,0,0.25); backdrop-filter: blur(4px); border-radius: 6px; padding: 8px 10px;
    text-align: center; min-width: 90px; pointer-events: none;
  }
  .swatch-hex { font-size: 13px; font-weight: bold; letter-spacing: 0.05em; margin-bottom: 4px; }
  .swatch-rgb, .swatch-hsl { font-size: 9px; opacity: 0.7; }
  .swatch-name { font-size: 9px; margin-top: 4px; opacity: 0.6; font-style: italic; }

  #sidebar { width: 260px; flex-shrink: 0; border-left: 1px solid #141428; display: flex; flex-direction: column; overflow-y: auto; background: #0a0a12; }
  .section { padding: 10px 14px; border-bottom: 1px solid #101020; }
  .section-title { font-size: 9px; color: #404060; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px; }

  #wheelCanvas { display: block; margin: 0 auto 8px; cursor: crosshair; }

  #harmonyBtns { display: flex; flex-wrap: wrap; gap: 4px; }
  #harmonyBtns button { font-size: 10px; padding: 2px 7px; }

  #savedPalettes { max-height: 200px; overflow-y: auto; }
  .saved-item { display: flex; align-items: center; gap: 4px; padding: 4px; cursor: pointer; border-radius: 3px; margin-bottom: 3px; }
  .saved-item:hover { background: #10102a; }
  .saved-swatch { width: 16px; height: 16px; border-radius: 2px; flex-shrink: 0; }
  .saved-label { font-size: 9px; color: #606080; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .saved-del { font-size: 9px; color: #804040; cursor: pointer; padding: 0 4px; }
  .saved-del:hover { color: #ff6060; }

  #cssOutput { width: 100%; background: #08080e; border: 1px solid #141428; color: #a0a0c0; font: 10px 'Courier New', monospace; padding: 6px; border-radius: 3px; resize: none; height: 80px; outline: none; }

  #statusBar { padding: 4px 12px; background: #06060c; border-top: 1px solid #101020; font-size: 10px; color: #303050; display: flex; gap: 16px; flex-shrink: 0; }
  .stat b { color: #505078; font-weight: normal; }

  .contrast-badge { display: inline-block; font-size: 8px; padding: 1px 4px; border-radius: 2px; margin-top: 2px; }
  .contrast-pass { background: #1a4020; color: #60c060; }
  .contrast-fail { background: #401a1a; color: #c06060; }
</style>
</head>
<body>

<div id="top">
  <h1>Color Palette</h1>
  <div class="sep"></div>
  <button onclick="generate()">Generate (Space)</button>
  <div class="sep"></div>
  <label>Colors: <select id="selCount" onchange="generate()">
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5" selected>5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
  </select></label>
  <div class="sep"></div>
  <label>Base: <input type="color" id="baseColor" value="#4488cc" onchange="generate()"></label>
  <label>Saturation: <input type="range" id="satRange" min="10" max="100" value="70" oninput="generate()"></label>
  <label>Lightness: <input type="range" id="litRange" min="15" max="85" value="55" oninput="generate()"></label>
  <div class="sep"></div>
  <button onclick="randomBase()">Random Base</button>
  <button onclick="exportPNG()">Export PNG</button>
</div>

<div id="main">
  <div id="paletteArea">
    <div id="swatches"></div>
  </div>
  <div id="sidebar">
    <div class="section">
      <div class="section-title">Color Wheel</div>
      <canvas id="wheelCanvas" width="220" height="220"></canvas>
    </div>
    <div class="section">
      <div class="section-title">Harmony Rule</div>
      <div id="harmonyBtns">
        <button class="active" data-h="complementary">Complementary</button>
        <button data-h="analogous">Analogous</button>
        <button data-h="triadic">Triadic</button>
        <button data-h="split">Split-Comp</button>
        <button data-h="tetradic">Tetradic</button>
        <button data-h="monochromatic">Mono</button>
        <button data-h="random">Random</button>
      </div>
    </div>
    <div class="section">
      <div class="section-title">CSS Export</div>
      <textarea id="cssOutput" readonly></textarea>
      <button onclick="copyCss()" style="margin-top:4px;width:100%">Copy CSS</button>
    </div>
    <div class="section">
      <div class="section-title">Saved Palettes</div>
      <button onclick="savePalette()" style="width:100%;margin-bottom:6px">Save Current</button>
      <div id="savedPalettes"></div>
    </div>
  </div>
</div>

<div id="statusBar">
  <span class="stat">Harmony: <b id="statHarmony">complementary</b></span>
  <span class="stat">Click swatch to lock | Space = generate | Click wheel to set base</span>
</div>

<script>
'use strict';

const swatchesEl = document.getElementById('swatches');
const wheelCanvas = document.getElementById('wheelCanvas');
const wheelCtx = wheelCanvas.getContext('2d');
const cssOutput = document.getElementById('cssOutput');

let colors = [];
let locked = [];
let harmony = 'complementary';
let saved = JSON.parse(localStorage.getItem('palettes') || '[]');

// ── Color math ──────────────────────────────────────────────────
function hsl2rgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60) { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else { r = c; g = 0; b = x; }
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}

function rgb2hsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) * 60;
    else if (max === g) h = ((b - r) / d + 2) * 60;
    else h = ((r - g) / d + 4) * 60;
  }
  return [Math.round(h), Math.round(s * 100), Math.round(l * 100)];
}

function hex2rgb(hex) {
  hex = hex.replace('#', '');
  return [parseInt(hex.slice(0, 2), 16), parseInt(hex.slice(2, 4), 16), parseInt(hex.slice(4, 6), 16)];
}

function rgb2hex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function luminance(r, g, b) {
  const [rs, gs, bs] = [r, g, b].map(v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); });
  return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
}

function contrastRatio(rgb1, rgb2) {
  const l1 = luminance(...rgb1) + 0.05;
  const l2 = luminance(...rgb2) + 0.05;
  return l1 > l2 ? l1 / l2 : l2 / l1;
}

function textColor(rgb) {
  return luminance(...rgb) > 0.35 ? [20, 20, 30] : [240, 240, 250];
}

// ── Harmony rules ───────────────────────────────────────────────
function getBaseHSL() {
  const rgb = hex2rgb(document.getElementById('baseColor').value);
  const hsl = rgb2hsl(...rgb);
  hsl[1] = parseInt(document.getElementById('satRange').value);
  hsl[2] = parseInt(document.getElementById('litRange').value);
  return hsl;
}

function generateHues(baseH, count) {
  const hues = [];
  switch (harmony) {
    case 'complementary':
      hues.push(baseH, baseH + 180);
      // Fill remaining with variations
      for (let i = 2; i < count; i++) hues.push(baseH + (i % 2 === 0 ? -30 : 210) + (i - 2) * 15);
      break;
    case 'analogous':
      for (let i = 0; i < count; i++) hues.push(baseH + (i - Math.floor(count / 2)) * 25);
      break;
    case 'triadic':
      hues.push(baseH, baseH + 120, baseH + 240);
      for (let i = 3; i < count; i++) hues.push(baseH + (i * 40));
      break;
    case 'split':
      hues.push(baseH, baseH + 150, baseH + 210);
      for (let i = 3; i < count; i++) hues.push(baseH + 150 + (i - 2) * 30);
      break;
    case 'tetradic':
      hues.push(baseH, baseH + 90, baseH + 180, baseH + 270);
      for (let i = 4; i < count; i++) hues.push(baseH + i * 45);
      break;
    case 'monochromatic':
      for (let i = 0; i < count; i++) hues.push(baseH);
      break;
    case 'random':
      for (let i = 0; i < count; i++) hues.push(Math.random() * 360);
      break;
  }
  return hues.slice(0, count).map(h => ((h % 360) + 360) % 360);
}

function generate() {
  const count = parseInt(document.getElementById('selCount').value);
  const [baseH, baseS, baseL] = getBaseHSL();

  // Adjust locked array size
  while (locked.length < count) locked.push(false);
  locked = locked.slice(0, count);
  while (colors.length < count) colors.push(null);
  colors = colors.slice(0, count);

  const hues = generateHues(baseH, count);

  for (let i = 0; i < count; i++) {
    if (locked[i] && colors[i]) continue;
    let s = baseS, l = baseL;
    if (harmony === 'monochromatic') {
      // Vary lightness
      l = Math.max(15, Math.min(85, baseL - 30 + (60 * i / (count - 1 || 1))));
      s = baseS + (Math.random() - 0.5) * 10;
    } else if (harmony === 'random') {
      s = 40 + Math.random() * 50;
      l = 30 + Math.random() * 40;
    } else {
      // Slight variation
      s = Math.max(10, Math.min(100, baseS + (Math.random() - 0.5) * 15));
      l = Math.max(20, Math.min(80, baseL + (Math.random() - 0.5) * 20));
    }
    const rgb = hsl2rgb(hues[i], s, l);
    colors[i] = { rgb, hsl: [Math.round(hues[i]), Math.round(s), Math.round(l)], hex: rgb2hex(...rgb) };
  }

  renderSwatches();
  drawWheel();
  updateCSS();
  document.getElementById('statHarmony').textContent = harmony;
}

// ── Render swatches ─────────────────────────────────────────────
function renderSwatches() {
  swatchesEl.innerHTML = '';
  colors.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'swatch' + (locked[i] ? ' locked' : '');
    div.style.background = c.hex;
    const tc = textColor(c.rgb);
    const tcStr = `rgb(${tc[0]},${tc[1]},${tc[2]})`;

    const contrast_white = contrastRatio(c.rgb, [255, 255, 255]).toFixed(1);
    const contrast_black = contrastRatio(c.rgb, [0, 0, 0]).toFixed(1);
    const wcag = Math.max(contrast_white, contrast_black) >= 4.5;

    div.innerHTML = `
      <div class="swatch-info" style="color:${tcStr}">
        <div class="swatch-hex">${c.hex.toUpperCase()}</div>
        <div class="swatch-rgb">rgb(${c.rgb.join(', ')})</div>
        <div class="swatch-hsl">hsl(${c.hsl[0]}, ${c.hsl[1]}%, ${c.hsl[2]}%)</div>
        <span class="contrast-badge ${wcag ? 'contrast-pass' : 'contrast-fail'}">
          ${wcag ? 'AA' : 'Fail'} ${Math.max(contrast_white, contrast_black)}:1
        </span>
      </div>`;

    div.addEventListener('click', () => {
      locked[i] = !locked[i];
      renderSwatches();
      drawWheel();
    });

    div.addEventListener('dblclick', () => {
      navigator.clipboard.writeText(c.hex.toUpperCase());
    });

    swatchesEl.appendChild(div);
  });
}

// ── Color wheel ─────────────────────────────────────────────────
function drawWheel() {
  const W = wheelCanvas.width, H = wheelCanvas.height;
  const cx = W / 2, cy = H / 2, R = 90;

  wheelCtx.clearRect(0, 0, W, H);

  // Draw hue ring
  for (let a = 0; a < 360; a++) {
    const rad = (a - 90) * Math.PI / 180;
    const rad2 = (a - 89) * Math.PI / 180;
    wheelCtx.beginPath();
    wheelCtx.moveTo(cx + (R - 18) * Math.cos(rad), cy + (R - 18) * Math.sin(rad));
    wheelCtx.lineTo(cx + R * Math.cos(rad), cy + R * Math.sin(rad));
    wheelCtx.lineTo(cx + R * Math.cos(rad2), cy + R * Math.sin(rad2));
    wheelCtx.lineTo(cx + (R - 18) * Math.cos(rad2), cy + (R - 18) * Math.sin(rad2));
    wheelCtx.closePath();
    const rgb = hsl2rgb(a, 80, 50);
    wheelCtx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    wheelCtx.fill();
  }

  // Center circle with base color
  const [bh, bs, bl] = getBaseHSL();
  const brgb = hsl2rgb(bh, bs, bl);
  wheelCtx.fillStyle = `rgb(${brgb[0]},${brgb[1]},${brgb[2]})`;
  wheelCtx.beginPath();
  wheelCtx.arc(cx, cy, R - 28, 0, Math.PI * 2);
  wheelCtx.fill();

  // Draw harmony lines and dots
  wheelCtx.strokeStyle = 'rgba(255,255,255,0.3)';
  wheelCtx.lineWidth = 1;
  colors.forEach((c, i) => {
    if (!c) return;
    const a = (c.hsl[0] - 90) * Math.PI / 180;
    const px = cx + (R - 9) * Math.cos(a);
    const py = cy + (R - 9) * Math.sin(a);

    if (i > 0) {
      const prevA = (colors[0].hsl[0] - 90) * Math.PI / 180;
      wheelCtx.beginPath();
      wheelCtx.moveTo(cx + (R - 9) * Math.cos(prevA), cy + (R - 9) * Math.sin(prevA));
      wheelCtx.lineTo(px, py);
      wheelCtx.stroke();
    }

    // Dot
    wheelCtx.fillStyle = c.hex;
    wheelCtx.strokeStyle = '#fff';
    wheelCtx.lineWidth = 2;
    wheelCtx.beginPath();
    wheelCtx.arc(px, py, 6, 0, Math.PI * 2);
    wheelCtx.fill();
    wheelCtx.stroke();
    wheelCtx.strokeStyle = 'rgba(255,255,255,0.3)';
    wheelCtx.lineWidth = 1;
  });
}

// Wheel click to set base hue
wheelCanvas.addEventListener('click', e => {
  const rect = wheelCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left - wheelCanvas.width / 2;
  const y = e.clientY - rect.top - wheelCanvas.height / 2;
  let angle = Math.atan2(y, x) * 180 / Math.PI + 90;
  if (angle < 0) angle += 360;
  const hsl = getBaseHSL();
  const rgb = hsl2rgb(angle, hsl[1], hsl[2]);
  document.getElementById('baseColor').value = rgb2hex(...rgb);
  generate();
});

// ── CSS output ──────────────────────────────────────────────────
function updateCSS() {
  let css = ':root {\n';
  colors.forEach((c, i) => {
    css += `  --color-${i + 1}: ${c.hex};\n`;
  });
  css += '}\n';
  cssOutput.value = css;
}

function copyCss() {
  navigator.clipboard.writeText(cssOutput.value);
}

// ── Harmony buttons ─────────────────────────────────────────────
document.querySelectorAll('#harmonyBtns button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#harmonyBtns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    harmony = btn.dataset.h;
    generate();
  });
});

// ── Save/load palettes ──────────────────────────────────────────
function savePalette() {
  saved.push({ colors: colors.map(c => c.hex), harmony, date: Date.now() });
  localStorage.setItem('palettes', JSON.stringify(saved));
  renderSaved();
}

function renderSaved() {
  const el = document.getElementById('savedPalettes');
  el.innerHTML = '';
  saved.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'saved-item';
    div.innerHTML = p.colors.map(c => `<div class="saved-swatch" style="background:${c}"></div>`).join('') +
      `<span class="saved-label">${p.harmony} (${p.colors.length})</span>` +
      `<span class="saved-del" data-i="${i}">&times;</span>`;
    div.addEventListener('click', e => {
      if (e.target.classList.contains('saved-del')) {
        saved.splice(parseInt(e.target.dataset.i), 1);
        localStorage.setItem('palettes', JSON.stringify(saved));
        renderSaved();
        return;
      }
      // Load palette
      document.getElementById('selCount').value = p.colors.length;
      harmony = p.harmony;
      document.querySelectorAll('#harmonyBtns button').forEach(b => b.classList.toggle('active', b.dataset.h === harmony));
      colors = p.colors.map(hex => {
        const rgb = hex2rgb(hex);
        return { rgb, hsl: rgb2hsl(...rgb), hex };
      });
      locked = colors.map(() => false);
      document.getElementById('baseColor').value = p.colors[0];
      renderSwatches();
      drawWheel();
      updateCSS();
    });
    el.appendChild(div);
  });
}

// ── Export PNG ───────────────────────────────────────────────────
function exportPNG() {
  const w = colors.length * 200, h = 300;
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  colors.forEach((c, i) => {
    ctx.fillStyle = c.hex;
    ctx.fillRect(i * 200, 0, 200, h);
    const tc = textColor(c.rgb);
    ctx.fillStyle = `rgb(${tc[0]},${tc[1]},${tc[2]})`;
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.hex.toUpperCase(), i * 200 + 100, h - 40);
    ctx.font = '11px sans-serif';
    ctx.fillText(`rgb(${c.rgb.join(', ')})`, i * 200 + 100, h - 20);
  });
  const a = document.createElement('a');
  a.href = cv.toDataURL('image/png');
  a.download = 'palette.png';
  a.click();
}

function randomBase() {
  const h = Math.random() * 360;
  const s = 50 + Math.random() * 40;
  const l = 35 + Math.random() * 30;
  const rgb = hsl2rgb(h, s, l);
  document.getElementById('baseColor').value = rgb2hex(...rgb);
  document.getElementById('satRange').value = Math.round(s);
  document.getElementById('litRange').value = Math.round(l);
  generate();
}

// ── Keyboard ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === ' ' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    generate();
  }
});

// ── Init ────────────────────────────────────────────────────────
renderSaved();
generate();
</script>
</body>
</html>
