<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #a0a0b8; font: 12px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #top { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #0a0a14; border-bottom: 1px solid #141428; flex-shrink: 0; flex-wrap: wrap; }
  h1 { font-size: 11px; color: #808098; letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; }
  .sep { width: 1px; height: 18px; background: #1a1a30; margin: 0 2px; }
  button { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; border-radius: 3px; }
  button:hover { background: #14142a; color: #9090c0; }
  select { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; font: 11px 'Courier New', monospace; padding: 2px 6px; border-radius: 3px; }

  #main { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 16px; }

  #scores { display: flex; gap: 16px; margin-bottom: 8px; }
  .score-box { background: #0c0c20; border: 1px solid #1a1a40; border-radius: 6px; padding: 8px 20px; text-align: center; min-width: 90px; }
  .score-box .label { font-size: 9px; color: #404060; text-transform: uppercase; letter-spacing: 0.1em; }
  .score-box .value { font-size: 20px; color: #8090c0; }
  .score-box .value.highlight { color: #c0a040; }

  #board { position: relative; background: #0c0c20; border-radius: 8px; padding: 8px; }
  .cell-bg { position: absolute; background: #10102a; border-radius: 4px; }
  .tile { position: absolute; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: left 0.12s ease, top 0.12s ease; z-index: 2; }
  .tile.new { animation: tileAppear 0.2s ease; }
  .tile.merged { animation: tileMerge 0.2s ease; z-index: 3; }
  @keyframes tileAppear { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  @keyframes tileMerge { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

  #overlay { display: none; position: absolute; inset: 0; background: rgba(8,8,16,0.8); border-radius: 8px; z-index: 10; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 28px; font-weight: normal; }
  #overlay.win h2 { color: #c0a040; }
  #overlay.lose h2 { color: #c04040; }
  #overlay button { font-size: 13px; padding: 8px 24px; }

  #statusBar { padding: 4px 12px; background: #06060c; border-top: 1px solid #101020; font-size: 10px; color: #303050; display: flex; gap: 16px; flex-shrink: 0; }
  .stat b { color: #505078; font-weight: normal; }
</style>
</head>
<body>

<div id="top">
  <h1>2048</h1>
  <div class="sep"></div>
  <select id="selSize" onchange="gridSize=+this.value;newGame()">
    <option value="3">3×3</option>
    <option value="4" selected>4×4</option>
    <option value="5">5×5</option>
    <option value="6">6×6</option>
  </select>
  <select id="selGoal" onchange="goalTile=+this.value;newGame()">
    <option value="512">Goal: 512</option>
    <option value="1024">Goal: 1024</option>
    <option value="2048" selected>Goal: 2048</option>
    <option value="4096">Goal: 4096</option>
    <option value="8192">Goal: 8192</option>
  </select>
  <div class="sep"></div>
  <button onclick="newGame()">New Game (R)</button>
  <button onclick="undo()">Undo (Z)</button>
</div>

<div id="main">
  <div id="scores">
    <div class="score-box"><div class="label">Score</div><div class="value" id="scoreVal">0</div></div>
    <div class="score-box"><div class="label">Best</div><div class="value highlight" id="bestVal">0</div></div>
    <div class="score-box"><div class="label">Moves</div><div class="value" id="moveVal">0</div></div>
    <div class="score-box"><div class="label">Max Tile</div><div class="value" id="maxTile">0</div></div>
  </div>
  <div id="board">
    <div id="overlay">
      <h2 id="overlayText"></h2>
      <button onclick="continueGame()">Continue</button>
      <button onclick="newGame()">New Game</button>
    </div>
  </div>
</div>

<div id="statusBar">
  <span class="stat">Arrow keys / WASD / Swipe to move tiles | Combine matching numbers to reach <b id="goalLabel">2048</b></span>
</div>

<script>
'use strict';

let gridSize = 4;
let goalTile = 2048;
let grid, prevGrid, prevScore;
let score, bestScore = 0, moves;
let gameWon, gameLost, continuePlaying;
let tileElements = [];
let CELL, GAP, BOARD;

const tileColors = {
  2:    { bg: '#1a2040', fg: '#8090c0' },
  4:    { bg: '#1a2a50', fg: '#90a0d0' },
  8:    { bg: '#2a3a60', fg: '#a0b0e0' },
  16:   { bg: '#3a4a70', fg: '#c0c8e0' },
  32:   { bg: '#4a4060', fg: '#d0b0d0' },
  64:   { bg: '#5a3a50', fg: '#e0a0c0' },
  128:  { bg: '#6a4a30', fg: '#e0c080' },
  256:  { bg: '#7a5a20', fg: '#f0d060' },
  512:  { bg: '#8a6a10', fg: '#f0e040' },
  1024: { bg: '#8a5a10', fg: '#ffe030' },
  2048: { bg: '#a06a00', fg: '#ffe020' },
  4096: { bg: '#a04020', fg: '#ffc0a0' },
  8192: { bg: '#802040', fg: '#ffa0c0' },
};

function getColor(val) {
  return tileColors[val] || { bg: '#602060', fg: '#f0c0f0' };
}

function fontSize(val) {
  const digits = String(val).length;
  const base = CELL * 0.45;
  if (digits <= 2) return base;
  if (digits === 3) return base * 0.8;
  if (digits === 4) return base * 0.65;
  return base * 0.55;
}

// ── Board sizing ─────────────────────────────────────────────────
function calcSizes() {
  const maxBoard = Math.min(window.innerWidth - 40, window.innerHeight - 200, 500);
  GAP = Math.max(4, Math.floor(8 - gridSize));
  CELL = Math.floor((maxBoard - GAP * (gridSize + 1)) / gridSize);
  BOARD = CELL * gridSize + GAP * (gridSize + 1);
}

function cellPos(r, c) {
  return {
    x: GAP + c * (CELL + GAP),
    y: GAP + r * (CELL + GAP)
  };
}

// ── Game logic ───────────────────────────────────────────────────
function newGame() {
  calcSizes();
  grid = Array.from({ length: gridSize }, () => new Array(gridSize).fill(0));
  score = 0;
  moves = 0;
  gameWon = false;
  gameLost = false;
  continuePlaying = false;
  prevGrid = null;
  prevScore = 0;
  addRandom();
  addRandom();
  renderBoard();
  updateUI();
  document.getElementById('overlay').classList.remove('show', 'win', 'lose');
  document.getElementById('goalLabel').textContent = goalTile;
}

function addRandom() {
  const empty = [];
  for (let r = 0; r < gridSize; r++)
    for (let c = 0; c < gridSize; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return false;
  const [r, c] = empty[Math.random() * empty.length | 0];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  return true;
}

function cloneGrid() {
  return grid.map(row => [...row]);
}

function move(dir) {
  if (gameLost || (gameWon && !continuePlaying)) return;

  prevGrid = cloneGrid();
  prevScore = score;

  let moved = false;
  const merged = Array.from({ length: gridSize }, () => new Array(gridSize).fill(false));

  // 0=up, 1=right, 2=down, 3=left
  const dr = [[-1,0],[0,1],[1,0],[0,-1]];
  const rRange = dir === 2 ? range(gridSize - 2, -1) : range(0, gridSize);
  const cRange = dir === 1 ? range(gridSize - 2, -1) : range(0, gridSize);

  for (const r of rRange) {
    for (const c of cRange) {
      if (grid[r][c] === 0) continue;
      let nr = r, nc = c;
      while (true) {
        const tr = nr + dr[dir][0];
        const tc = nc + dr[dir][1];
        if (tr < 0 || tr >= gridSize || tc < 0 || tc >= gridSize) break;
        if (grid[tr][tc] === 0) {
          grid[tr][tc] = grid[nr][nc];
          grid[nr][nc] = 0;
          nr = tr; nc = tc;
          moved = true;
        } else if (grid[tr][tc] === grid[nr][nc] && !merged[tr][tc]) {
          grid[tr][tc] *= 2;
          score += grid[tr][tc];
          grid[nr][nc] = 0;
          merged[tr][tc] = true;
          moved = true;
          break;
        } else {
          break;
        }
      }
    }
  }

  if (!moved) { prevGrid = null; return; }

  moves++;
  addRandom();

  // Check win
  if (!gameWon && !continuePlaying) {
    for (let r = 0; r < gridSize; r++)
      for (let c = 0; c < gridSize; c++)
        if (grid[r][c] >= goalTile) { gameWon = true; }
  }

  // Check lose
  if (!canMove()) gameLost = true;

  if (score > bestScore) bestScore = score;

  renderBoard();
  updateUI();

  if (gameWon && !continuePlaying) {
    showOverlay('You Win!', 'win');
  } else if (gameLost) {
    showOverlay('Game Over', 'lose');
  }
}

function canMove() {
  for (let r = 0; r < gridSize; r++)
    for (let c = 0; c < gridSize; c++) {
      if (grid[r][c] === 0) return true;
      if (c < gridSize - 1 && grid[r][c] === grid[r][c + 1]) return true;
      if (r < gridSize - 1 && grid[r][c] === grid[r + 1][c]) return true;
    }
  return false;
}

function range(start, end) {
  const arr = [];
  if (start < end) for (let i = start; i < end; i++) arr.push(i);
  else for (let i = start; i >= end; i--) arr.push(i);
  return arr;
}

function undo() {
  if (!prevGrid) return;
  grid = prevGrid;
  score = prevScore;
  prevGrid = null;
  gameWon = false;
  gameLost = false;
  moves = Math.max(0, moves - 1);
  renderBoard();
  updateUI();
  document.getElementById('overlay').classList.remove('show', 'win', 'lose');
}

function continueGame() {
  continuePlaying = true;
  document.getElementById('overlay').classList.remove('show', 'win', 'lose');
}

function showOverlay(text, cls) {
  const ov = document.getElementById('overlay');
  document.getElementById('overlayText').textContent = text;
  ov.className = 'show ' + cls;
}

// ── Rendering ────────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.style.width = BOARD + 'px';
  board.style.height = BOARD + 'px';

  // Remove old tiles and backgrounds
  board.querySelectorAll('.tile, .cell-bg').forEach(el => el.remove());

  // Background cells
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      const pos = cellPos(r, c);
      const bg = document.createElement('div');
      bg.className = 'cell-bg';
      bg.style.left = pos.x + 'px';
      bg.style.top = pos.y + 'px';
      bg.style.width = CELL + 'px';
      bg.style.height = CELL + 'px';
      board.appendChild(bg);
    }
  }

  // Tiles
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      const val = grid[r][c];
      if (val === 0) continue;
      const pos = cellPos(r, c);
      const { bg, fg } = getColor(val);

      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.left = pos.x + 'px';
      tile.style.top = pos.y + 'px';
      tile.style.width = CELL + 'px';
      tile.style.height = CELL + 'px';
      tile.style.background = bg;
      tile.style.color = fg;
      tile.style.fontSize = fontSize(val) + 'px';
      tile.textContent = val;

      // Check if this is new or merged
      if (prevGrid) {
        if (prevGrid[r][c] === 0) tile.classList.add('new');
        else if (prevGrid[r][c] !== val && val > 2) tile.classList.add('merged');
      }

      board.appendChild(tile);
    }
  }
}

function updateUI() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('bestVal').textContent = bestScore;
  document.getElementById('moveVal').textContent = moves;
  let maxT = 0;
  for (let r = 0; r < gridSize; r++)
    for (let c = 0; c < gridSize; c++)
      if (grid[r][c] > maxT) maxT = grid[r][c];
  document.getElementById('maxTile').textContent = maxT;
}

// ── Input ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); move(0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); move(1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); move(2); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); move(3); break;
    case 'r': newGame(); break;
    case 'z': undo(); break;
  }
});

// Touch/swipe
let touchStart = null;
document.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
document.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    move(dx > 0 ? 1 : 3);
  } else {
    move(dy > 0 ? 2 : 0);
  }
});

newGame();
</script>
</body>
</html>
