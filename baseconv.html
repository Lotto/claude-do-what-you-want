<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Converter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #a0a0b8; font: 12px 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #top { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #0a0a14; border-bottom: 1px solid #141428; flex-shrink: 0; flex-wrap: wrap; }
  h1 { font-size: 11px; color: #808098; letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; }
  .sep { width: 1px; height: 18px; background: #1a1a30; margin: 0 2px; }
  button { background: #0c0c18; border: 1px solid #1a1a30; color: #6060a0; padding: 3px 10px; font: 11px 'Courier New', monospace; cursor: pointer; border-radius: 3px; }
  button:hover { background: #14142a; color: #9090c0; }
  button.active { background: #1a2a50; color: #80b0ff; border-color: #3060a0; }

  #main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; max-width: 900px; margin: 0 auto; width: 100%; }

  .converter-row {
    background: #0a0a14; border: 1px solid #141428; border-radius: 8px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px; transition: border-color 0.2s;
  }
  .converter-row:focus-within { border-color: #2040a0; }
  .row-label { width: 80px; flex-shrink: 0; }
  .row-name { font-size: 13px; font-weight: bold; }
  .row-base { font-size: 9px; color: #404060; margin-top: 2px; }
  .row-input {
    flex: 1; background: #08080e; border: 1px solid #1a1a30; border-radius: 4px; color: #d0d0f0;
    font: 16px 'Courier New', monospace; padding: 10px 12px; outline: none; letter-spacing: 0.05em;
  }
  .row-input:focus { border-color: #3060a0; background: #0a0a18; }
  .row-input.error { border-color: #803030; color: #ff6060; }
  .row-copy { flex-shrink: 0; }

  .row-input.bin { color: #60c0a0; }
  .row-input.oct { color: #c0a060; }
  .row-input.dec { color: #8090e0; }
  .row-input.hex { color: #c080c0; }
  .row-input.b64 { color: #80c0c0; }
  .row-input.custom { color: #c0c080; }

  /* Bit grid */
  #bitSection { background: #0a0a14; border: 1px solid #141428; border-radius: 8px; padding: 14px 16px; }
  .bit-title { font-size: 10px; color: #404060; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  #bitGrid { display: flex; flex-wrap: wrap; gap: 2px; }
  .bit-group { display: flex; gap: 1px; margin-right: 8px; margin-bottom: 4px; }
  .bit-group-label { font-size: 8px; color: #303050; text-align: center; margin-top: 2px; }
  .bit-cell {
    width: 24px; height: 28px; display: flex; align-items: center; justify-content: center;
    background: #0c0c18; border: 1px solid #1a1a30; border-radius: 3px; cursor: pointer;
    font-size: 13px; font-weight: bold; color: #404060; user-select: none; transition: all 0.1s;
  }
  .bit-cell.on { background: #1a3050; color: #60c0ff; border-color: #2050a0; }
  .bit-cell:hover { border-color: #4060a0; }
  .bit-index { font-size: 7px; color: #252540; text-align: center; margin-top: 1px; }

  /* Operations */
  #opSection { background: #0a0a14; border: 1px solid #141428; border-radius: 8px; padding: 14px 16px; }
  .op-title { font-size: 10px; color: #404060; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  .op-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .op-row button { padding: 4px 10px; }
  .op-input {
    width: 80px; background: #08080e; border: 1px solid #1a1a30; border-radius: 3px;
    color: #c0c0e0; font: 12px 'Courier New', monospace; padding: 4px 6px; outline: none; text-align: center;
  }
  .op-result { color: #6090c0; font-size: 11px; margin-left: 8px; }

  /* Info panel */
  #infoSection { background: #0a0a14; border: 1px solid #141428; border-radius: 8px; padding: 14px 16px; }
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; }
  .info-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #0e0e1c; }
  .info-label { color: #505070; font-size: 11px; }
  .info-value { color: #8090c0; font-size: 11px; font-weight: bold; }

  #statusBar { padding: 4px 12px; background: #06060c; border-top: 1px solid #101020; font-size: 10px; color: #303050; flex-shrink: 0; }
</style>
</head>
<body>

<div id="top">
  <h1>Base Converter</h1>
  <div class="sep"></div>
  <button onclick="setWidth(8)" id="btn8">8-bit</button>
  <button onclick="setWidth(16)" id="btn16">16-bit</button>
  <button onclick="setWidth(32)" id="btn32" class="active">32-bit</button>
  <button onclick="setWidth(64)" id="btn64">64-bit</button>
  <div class="sep"></div>
  <button onclick="toggleSigned()" id="btnSigned">Unsigned</button>
  <div class="sep"></div>
  <button onclick="clearAll()">Clear</button>
  <button onclick="setVal(BigInt(Date.now()))">Unix Now</button>
</div>

<div id="main">
  <!-- Converter rows -->
  <div class="converter-row">
    <div class="row-label"><div class="row-name" style="color:#60c0a0">BIN</div><div class="row-base">Base 2</div></div>
    <input class="row-input bin" id="inBin" spellcheck="false" placeholder="0" oninput="fromBase(2)">
    <button class="row-copy" onclick="copyField('inBin')">Copy</button>
  </div>

  <div class="converter-row">
    <div class="row-label"><div class="row-name" style="color:#c0a060">OCT</div><div class="row-base">Base 8</div></div>
    <input class="row-input oct" id="inOct" spellcheck="false" placeholder="0" oninput="fromBase(8)">
    <button class="row-copy" onclick="copyField('inOct')">Copy</button>
  </div>

  <div class="converter-row">
    <div class="row-label"><div class="row-name" style="color:#8090e0">DEC</div><div class="row-base">Base 10</div></div>
    <input class="row-input dec" id="inDec" spellcheck="false" placeholder="0" oninput="fromBase(10)">
    <button class="row-copy" onclick="copyField('inDec')">Copy</button>
  </div>

  <div class="converter-row">
    <div class="row-label"><div class="row-name" style="color:#c080c0">HEX</div><div class="row-base">Base 16</div></div>
    <input class="row-input hex" id="inHex" spellcheck="false" placeholder="0" oninput="fromBase(16)">
    <button class="row-copy" onclick="copyField('inHex')">Copy</button>
  </div>

  <div class="converter-row">
    <div class="row-label"><div class="row-name" style="color:#80c0c0">B64</div><div class="row-base">Base 64</div></div>
    <input class="row-input b64" id="inB64" spellcheck="false" placeholder="" readonly>
    <button class="row-copy" onclick="copyField('inB64')">Copy</button>
  </div>

  <div class="converter-row">
    <div class="row-label"><div class="row-name" style="color:#c0c080">Custom</div><div class="row-base">Base <input type="number" id="customBase" value="36" min="2" max="36" style="width:36px;background:#08080e;border:1px solid #1a1a30;color:#c0c080;font:11px monospace;padding:1px 3px;border-radius:2px;text-align:center" onchange="updateAll()"></div></div>
    <input class="row-input custom" id="inCustom" spellcheck="false" placeholder="0" oninput="fromCustom()">
    <button class="row-copy" onclick="copyField('inCustom')">Copy</button>
  </div>

  <!-- Bit grid -->
  <div id="bitSection">
    <div class="bit-title">Bit Editor <span id="bitCount" style="color:#505078">(32 bits)</span></div>
    <div id="bitGrid"></div>
  </div>

  <!-- Bitwise operations -->
  <div id="opSection">
    <div class="op-title">Bitwise Operations</div>
    <div class="op-row">
      <button onclick="doShift('left')">Shift Left &lt;&lt;</button>
      <button onclick="doShift('right')">Shift Right &gt;&gt;</button>
      <input class="op-input" id="shiftAmount" type="number" value="1" min="0" max="63">
      <span style="color:#404060">bits</span>
    </div>
    <div class="op-row">
      <button onclick="doOp('not')">NOT ~</button>
      <button onclick="doOp('and')">AND &amp;</button>
      <button onclick="doOp('or')">OR |</button>
      <button onclick="doOp('xor')">XOR ^</button>
      <span style="color:#404060">with:</span>
      <input class="op-input" id="opOperand" value="FF" style="width:120px" spellcheck="false">
      <span style="color:#404060">(hex)</span>
      <span class="op-result" id="opResult"></span>
    </div>
    <div class="op-row">
      <button onclick="doByteOp('reverse')">Reverse Bits</button>
      <button onclick="doByteOp('swap')">Byte Swap</button>
      <button onclick="doByteOp('popcnt')">Pop Count</button>
      <span class="op-result" id="byteResult"></span>
    </div>
  </div>

  <!-- Info panel -->
  <div id="infoSection">
    <div class="op-title">Number Info</div>
    <div class="info-grid" id="infoGrid"></div>
  </div>
</div>

<div id="statusBar">
  <span>Type in any field to convert | Click bits to toggle | All bases sync in real-time</span>
</div>

<script>
'use strict';

let currentValue = 0n;
let bitWidth = 32;
let signed = false;
const MASK = () => (1n << BigInt(bitWidth)) - 1n;
const SIGN_BIT = () => 1n << BigInt(bitWidth - 1);

// ── Core conversion ─────────────────────────────────────────────
function setVal(v) {
  // Clamp to bit width
  v = v & MASK();
  currentValue = v;
  updateAll();
}

function fromBase(base) {
  const fields = { 2: 'inBin', 8: 'inOct', 10: 'inDec', 16: 'inHex' };
  const el = document.getElementById(fields[base]);
  let text = el.value.replace(/[\s_]/g, '');
  if (!text) { setVal(0n); return; }

  // Handle negative for signed decimal
  let neg = false;
  if (base === 10 && signed && text.startsWith('-')) {
    neg = true;
    text = text.slice(1);
  }

  try {
    // Validate characters
    const validChars = '0123456789abcdef'.slice(0, base);
    if (!text.split('').every(c => validChars.includes(c.toLowerCase()))) {
      el.classList.add('error');
      return;
    }
    el.classList.remove('error');

    let val = BigInt(base === 10 ? text : '0x0');
    if (base !== 10 && base !== 16) {
      val = 0n;
      for (const ch of text) val = val * BigInt(base) + BigInt(parseInt(ch, base));
    } else if (base === 16) {
      val = BigInt('0x' + text);
    } else {
      val = BigInt(text);
    }

    if (neg) {
      // Two's complement
      val = ((~val) + 1n) & MASK();
    }

    currentValue = val & MASK();
    updateAllExcept(fields[base]);
  } catch (e) {
    el.classList.add('error');
  }
}

function fromCustom() {
  const base = parseInt(document.getElementById('customBase').value);
  const el = document.getElementById('inCustom');
  let text = el.value.replace(/[\s_]/g, '');
  if (!text) { setVal(0n); return; }

  try {
    const validChars = '0123456789abcdefghijklmnopqrstuvwxyz'.slice(0, base);
    if (!text.split('').every(c => validChars.includes(c.toLowerCase()))) {
      el.classList.add('error');
      return;
    }
    el.classList.remove('error');

    let val = 0n;
    for (const ch of text.toLowerCase()) {
      const d = ch >= 'a' ? ch.charCodeAt(0) - 87 : ch.charCodeAt(0) - 48;
      val = val * BigInt(base) + BigInt(d);
    }
    currentValue = val & MASK();
    updateAllExcept('inCustom');
  } catch (e) {
    el.classList.add('error');
  }
}

function updateAll() { updateAllExcept(null); }

function updateAllExcept(skipId) {
  const v = currentValue;

  if (skipId !== 'inBin') {
    document.getElementById('inBin').value = formatBin(v);
    document.getElementById('inBin').classList.remove('error');
  }
  if (skipId !== 'inOct') {
    document.getElementById('inOct').value = v.toString(8);
    document.getElementById('inOct').classList.remove('error');
  }
  if (skipId !== 'inDec') {
    let dec;
    if (signed && (v & SIGN_BIT())) {
      dec = '-' + ((~v + 1n) & MASK()).toString(10);
    } else {
      dec = v.toString(10);
    }
    document.getElementById('inDec').value = dec;
    document.getElementById('inDec').classList.remove('error');
  }
  if (skipId !== 'inHex') {
    document.getElementById('inHex').value = v.toString(16).toUpperCase();
    document.getElementById('inHex').classList.remove('error');
  }
  if (skipId !== 'inCustom') {
    const base = parseInt(document.getElementById('customBase').value);
    document.getElementById('inCustom').value = toBaseStr(v, base);
    document.getElementById('inCustom').classList.remove('error');
  }

  // Base64 (encode the hex bytes)
  const hexStr = v.toString(16).padStart(Math.ceil(bitWidth / 4), '0');
  const bytes = [];
  for (let i = 0; i < hexStr.length; i += 2) bytes.push(parseInt(hexStr.slice(i, i + 2), 16));
  document.getElementById('inB64').value = btoa(String.fromCharCode(...bytes));

  renderBits();
  renderInfo();
}

function formatBin(v) {
  let s = v.toString(2).padStart(bitWidth, '0');
  // Group by 4
  let out = '';
  for (let i = 0; i < s.length; i++) {
    if (i > 0 && (s.length - i) % 4 === 0) out += ' ';
    out += s[i];
  }
  return out;
}

function toBaseStr(v, base) {
  if (v === 0n) return '0';
  const chars = '0123456789abcdefghijklmnopqrstuvwxyz';
  let s = '';
  let n = v;
  const b = BigInt(base);
  while (n > 0n) {
    s = chars[Number(n % b)] + s;
    n = n / b;
  }
  return s;
}

// ── Bit grid ────────────────────────────────────────────────────
function renderBits() {
  const grid = document.getElementById('bitGrid');
  grid.innerHTML = '';
  document.getElementById('bitCount').textContent = `(${bitWidth} bits)`;

  const binStr = currentValue.toString(2).padStart(bitWidth, '0');

  // Groups of 8 bits
  for (let g = 0; g < bitWidth; g += 8) {
    const group = document.createElement('div');
    group.style.display = 'flex';
    group.style.flexDirection = 'column';
    group.style.marginRight = '12px';
    group.style.marginBottom = '6px';

    const cells = document.createElement('div');
    cells.className = 'bit-group';

    const indices = document.createElement('div');
    indices.className = 'bit-group';

    for (let b = g; b < Math.min(g + 8, bitWidth); b++) {
      const bitIdx = b;
      const bitPos = bitWidth - 1 - b;
      const isOn = binStr[b] === '1';

      const cell = document.createElement('div');
      cell.className = 'bit-cell' + (isOn ? ' on' : '');
      cell.textContent = isOn ? '1' : '0';
      cell.addEventListener('click', () => {
        currentValue ^= (1n << BigInt(bitPos));
        currentValue &= MASK();
        updateAll();
      });
      cells.appendChild(cell);

      const idx = document.createElement('div');
      idx.className = 'bit-index';
      idx.textContent = bitPos;
      indices.appendChild(idx);
    }

    group.appendChild(cells);
    group.appendChild(indices);
    grid.appendChild(group);
  }
}

// ── Bitwise operations ──────────────────────────────────────────
function doShift(dir) {
  const amt = BigInt(parseInt(document.getElementById('shiftAmount').value) || 0);
  if (dir === 'left') setVal(currentValue << amt);
  else setVal(currentValue >> amt);
}

function doOp(op) {
  if (op === 'not') {
    setVal(~currentValue);
    return;
  }
  const opText = document.getElementById('opOperand').value.replace(/[\s_]/g, '');
  let operand;
  try { operand = BigInt('0x' + opText); } catch { return; }

  if (op === 'and') setVal(currentValue & operand);
  else if (op === 'or') setVal(currentValue | operand);
  else if (op === 'xor') setVal(currentValue ^ operand);
}

function doByteOp(op) {
  const el = document.getElementById('byteResult');
  if (op === 'reverse') {
    let v = currentValue, result = 0n;
    for (let i = 0; i < bitWidth; i++) {
      result = (result << 1n) | (v & 1n);
      v >>= 1n;
    }
    setVal(result);
    el.textContent = '';
  } else if (op === 'swap') {
    // Byte-swap
    const bytes = bitWidth / 8;
    let result = 0n;
    for (let i = 0; i < bytes; i++) {
      const b = (currentValue >> BigInt(i * 8)) & 0xFFn;
      result |= b << BigInt((bytes - 1 - i) * 8);
    }
    setVal(result);
    el.textContent = '';
  } else if (op === 'popcnt') {
    let v = currentValue, count = 0;
    while (v > 0n) { count += Number(v & 1n); v >>= 1n; }
    el.textContent = `Population count: ${count} bits set`;
  }
}

// ── Info panel ──────────────────────────────────────────────────
function renderInfo() {
  const v = currentValue;
  const grid = document.getElementById('infoGrid');

  const signedVal = (v & SIGN_BIT()) ? '-' + ((~v + 1n) & MASK()).toString(10) : v.toString(10);
  const unsignedVal = v.toString(10);

  // Popcount
  let pc = 0; let tmp = v;
  while (tmp > 0n) { pc += Number(tmp & 1n); tmp >>= 1n; }

  // Leading/trailing zeros
  const binStr = v.toString(2).padStart(bitWidth, '0');
  const lz = binStr.match(/^0*/)[0].length;
  const tz = v === 0n ? bitWidth : binStr.match(/0*$/)[0].length;

  // Is power of 2
  const isPow2 = v > 0n && (v & (v - 1n)) === 0n;

  const items = [
    ['Unsigned', unsignedVal],
    ['Signed (2\'s comp)', signedVal],
    ['Bits set', `${pc} / ${bitWidth}`],
    ['Leading zeros', lz],
    ['Trailing zeros', tz],
    ['Power of 2', isPow2 ? 'Yes (2^' + Math.log2(Number(v)) + ')' : 'No'],
    ['Byte count', bitWidth / 8],
    ['Max unsigned', MASK().toString(10).length > 15 ? '2^' + bitWidth + '-1' : MASK().toString(10)],
  ];

  // ASCII if value fits in printable range
  if (v >= 32n && v <= 126n) {
    items.push(['ASCII', `'${String.fromCharCode(Number(v))}'`]);
  }

  // IEEE 754 float if 32-bit
  if (bitWidth === 32 && v <= 0xFFFFFFFFn) {
    const buf = new ArrayBuffer(4);
    new DataView(buf).setUint32(0, Number(v));
    const f = new DataView(buf).getFloat32(0);
    items.push(['IEEE 754 float', isNaN(f) ? 'NaN' : f.toPrecision(7)]);
  }

  grid.innerHTML = items.map(([l, val]) =>
    `<div class="info-item"><span class="info-label">${l}</span><span class="info-value">${val}</span></div>`
  ).join('');
}

// ── Bit width / signed ──────────────────────────────────────────
function setWidth(w) {
  bitWidth = w;
  [8, 16, 32, 64].forEach(b => document.getElementById('btn' + b).classList.toggle('active', b === w));
  currentValue &= MASK();
  updateAll();
}

function toggleSigned() {
  signed = !signed;
  document.getElementById('btnSigned').textContent = signed ? 'Signed' : 'Unsigned';
  document.getElementById('btnSigned').classList.toggle('active', signed);
  updateAll();
}

function clearAll() { setVal(0n); }

function copyField(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.value.replace(/\s/g, ''));
}

// ── Keyboard ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'c') clearAll();
});

// ── Init ────────────────────────────────────────────────────────
setVal(0xDEADBEEFn);
</script>
</body>
</html>
